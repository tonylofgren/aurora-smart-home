# Battery-Powered Soil Moisture Sensor
# Recommended board: ESP32-C3 Super Mini (low power)
# External hardware: Capacitive soil moisture sensor v1.2 on ADC, optional DS18B20 for soil temp
# Variables: ${device_name}, ${friendly_name}, ${plant_name}

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-mini
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

deep_sleep:
  run_duration: 30s        # awake long enough to read + publish
  sleep_duration: 30min    # adjust for battery life vs data freshness

# Calibration values: replace with your dry/wet voltage readings
sensor:
  - platform: adc
    pin: GPIO0
    name: "${plant_name} Soil Moisture (raw)"
    update_interval: 5s
    attenuation: 12db
    filters:
      - calibrate_linear:
          # Replace these with values from your specific sensor
          - 2.45 -> 0.0   # dry air (~2.45V on ESP32-C3 ADC)
          - 1.10 -> 100.0  # in water
      - clamp:
          min_value: 0
          max_value: 100
    id: soil_moisture
    unit_of_measurement: "%"

  - platform: adc
    pin: VCC
    name: "Battery Voltage"
    update_interval: 5s
    attenuation: 0db
