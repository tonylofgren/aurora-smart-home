# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# RF gateway using ESPHome 2026.5.0's new radio_frequency entity type.
# CC1101 sub-GHz transceiver gives Home Assistant native 433.92 MHz
# control through the ir_rf_proxy platform - HA can send and receive
# arbitrary RF codes (garage remotes, weather stations, doorbells,
# 433 MHz outlets) without per-device Python.

substitutions:
  devicename: "rf-gateway"
  long_devicename: "RF Gateway"
  frequency: "433.92MHz"

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "433 MHz sub-GHz transceiver gateway"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# SPI bus to the CC1101 module
spi:
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23

# CC1101 sub-GHz transceiver. Adjust pins to your wiring.
cc1101:
  cs_pin: GPIO5
  gdo0_pin: GPIO16
  bandwidth: 200kHz
  frequency: "${frequency}"

# The CC1101 is exposed to ESPHome's existing remote_transmitter +
# remote_receiver components via its GDO0 pin. Standard ESPHome RF
# protocols (NEC, RC5, Panasonic, raw, Sony, etc.) all just work.
remote_transmitter:
  pin: GPIO16
  carrier_duty_percent: 100%

remote_receiver:
  pin: GPIO16
  dump: raw                        # change to specific protocols once you know what you're capturing
  tolerance: 50%
  filter: 250us
  idle: 4ms

# 2026.5.0+ radio_frequency entity. This is the new HA-facing surface.
# The ir_rf_proxy platform tells HA what frequency range and modulations
# this gateway supports, so HA can target it without per-chip knowledge.
radio_frequency:
  - platform: ir_rf_proxy
    name: "${long_devicename}"
    frequency_min: 433.0MHz
    frequency_max: 434.0MHz
    modulations:
      - OOK
      - FSK

# Diagnostic + maintenance entities
sensor:
  - platform: wifi_signal
    name: "${long_devicename} WiFi signal"
    update_interval: 60s
  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s

text_sensor:
  - platform: version
    name: "${long_devicename} ESPHome version"

switch:
  - platform: restart
    name: "${long_devicename} restart"

# Example: a virtual button that sends a learned doorbell code.
# Replace the raw timings with codes you captured via remote_receiver.
button:
  - platform: template
    name: "${long_devicename} Send doorbell test"
    on_press:
      - remote_transmitter.transmit_raw:
          carrier_frequency: 0Hz   # CC1101 carrier is set by the cc1101: block above
          code:
            # Replace with captured codes. These are placeholder timings.
            - 1000
            - -1000
            - 500
            - -500
            - 1000
            - -1000
