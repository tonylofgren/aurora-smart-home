# RF Gateway Automations for Home Assistant

# =============================================================================
# Press a learned 433 MHz outlet on/off from HA
# =============================================================================

- alias: "RF - Living Room Lamp on"
  id: rf_lamp_on
  description: "Turn on a 433 MHz outlet by replaying its captured code"
  triggers:
    - trigger: state
      entity_id: input_boolean.living_room_lamp
      to: "on"
  actions:
    - action: esphome.rf_gateway_transmit_raw
      data:
        # Replace with codes captured from your real remote
        code: [1000, -1000, 500, -500, 1000, -1000]

- alias: "RF - Living Room Lamp off"
  id: rf_lamp_off
  triggers:
    - trigger: state
      entity_id: input_boolean.living_room_lamp
      to: "off"
  actions:
    - action: esphome.rf_gateway_transmit_raw
      data:
        code: [500, -500, 1000, -1000, 500, -500]

# =============================================================================
# Doorbell received - announce on the speaker
# =============================================================================

- alias: "RF - Doorbell announce"
  id: rf_doorbell_announce
  description: "When the proxy detects the doorbell code, announce it"
  triggers:
    # The on_control trigger on the radio_frequency entity fires with the
    # received code. Replace with the address+command your doorbell uses.
    - trigger: event
      event_type: esphome.radio_frequency_received
      event_data:
        device: rf_gateway
        address: "0x4004"        # captured from your real doorbell
        command: "0xA1B2"        # captured from your real doorbell
  actions:
    - action: tts.cloud_say
      data:
        entity_id: media_player.living_room
        message: "Doorbell"

# =============================================================================
# Open garage door at scheduled time (if you've captured the rolling code
# or have a fixed-code garage opener)
# =============================================================================

- alias: "RF - Auto-close garage at 23:00"
  id: rf_garage_close
  description: "Send garage close code if door is still open at night"
  triggers:
    - trigger: time
      at: "23:00:00"
  conditions:
    - condition: state
      entity_id: cover.garage_door
      state: "open"
  actions:
    - action: esphome.rf_gateway_transmit_raw
      data:
        # Garage opener code. WARNING: rolling-code openers (post-2012) will
        # not work with simple replay - you need a learning remote bridge.
        code: [400, -400, 800, -800, 400, -400]
    - action: notify.notify
      data:
        title: "Garage"
        message: "Auto-closing garage door at 23:00."

# =============================================================================
# Weather station received - log it
# =============================================================================

- alias: "RF - Weather station packet"
  id: rf_weather_station
  description: "Log raw weather station packets for later decode"
  triggers:
    - trigger: event
      event_type: esphome.radio_frequency_received
      event_data:
        device: rf_gateway
  conditions:
    # Filter to packets that look like an Acurite 5n1 weather station
    - condition: template
      value_template: >
        {{ trigger.event.data.length | int > 50 }}
  actions:
    - action: logbook.log
      data:
        name: "Weather station"
        message: >
          Raw packet of length {{ trigger.event.data.length }} received
          on {{ trigger.event.data.frequency }} MHz.
