# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Fingerprint Door Unlock
# Optical fingerprint reader + electric strike / maglock relay
#
# Hardware:
#   - ESP32 DevKit
#   - Adafruit GROW R503 (or AS608 / R307) optical fingerprint reader (UART)
#   - 12V electric strike OR magnetic lock
#   - Relay module (5V coil, dry contact)
#   - Common cathode RGB status LED (or two separate LEDs)
#   - LiPo backup battery + TP4056 charger + boost converter (door survives brief outage)
#   - INA219 or resistor divider for battery voltage monitoring

substitutions:
  device_name: "front-door"
  friendly_name: "Front Door"

  # Fingerprint UART
  fp_rx_pin: "GPIO16"    # ESP32 RX  <- sensor TX (yellow)
  fp_tx_pin: "GPIO17"    # ESP32 TX  -> sensor RX (white)
  fp_touch_pin: "GPIO4"  # WAKEUP / touch-detect (blue) - optional

  # Lock relay
  relay_pin: "GPIO5"

  # Status LED (PWM)
  led_green_pin: "GPIO18"
  led_red_pin: "GPIO19"

  # Battery monitoring (ADC)
  vbat_pin: "GPIO34"

  # Unlock pulse duration (seconds)
  unlock_pulse: "2"

  # Battery cutoff (volts) - refuse to strike below this
  vbat_cutoff: "3.4"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  # Do not log fingerprint data over UART noise
  baud_rate: 0

# =============================================================================
# UART for the GROW R503 / AS608 fingerprint reader
# =============================================================================

uart:
  rx_pin: ${fp_rx_pin}
  tx_pin: ${fp_tx_pin}
  baud_rate: 57600

# =============================================================================
# Fingerprint reader component
# =============================================================================

fingerprint_grow:
  sensing_pin: ${fp_touch_pin}
  password: 0x0
  new_password: 0x0
  on_finger_scan_matched:
    - homeassistant.event:
        event: esphome.fingerprint_matched
        data:
          finger_id: !lambda 'return finger_id;'
          confidence: !lambda 'return confidence;'
    - if:
        condition:
          lambda: 'return id(vbat_v).state > ${vbat_cutoff};'
        then:
          - switch.turn_on: lock_relay
          - output.turn_on: led_green
          - delay: !lambda 'return ${unlock_pulse} * 1000;'
          - switch.turn_off: lock_relay
          - output.turn_off: led_green
        else:
          # Battery too low - blink red, do NOT energise the strike
          - output.turn_on: led_red
          - delay: 500ms
          - output.turn_off: led_red
  on_finger_scan_unmatched:
    - homeassistant.event:
        event: esphome.fingerprint_unmatched
    - output.turn_on: led_red
    - delay: 300ms
    - output.turn_off: led_red
    - delay: 200ms
    - output.turn_on: led_red
    - delay: 300ms
    - output.turn_off: led_red
  on_enrollment_scan:
    - homeassistant.event:
        event: esphome.fingerprint_enrollment_scan
        data:
          finger_id: !lambda 'return finger_id;'
          scan_num: !lambda 'return scan_num;'
  on_enrollment_done:
    - homeassistant.event:
        event: esphome.fingerprint_enrollment_done
        data:
          finger_id: !lambda 'return finger_id;'
  on_enrollment_failed:
    - homeassistant.event:
        event: esphome.fingerprint_enrollment_failed
        data:
          finger_id: !lambda 'return finger_id;'

# =============================================================================
# Outputs - status LED via PWM
# =============================================================================

output:
  - platform: ledc
    pin: ${led_green_pin}
    id: led_green
    frequency: 1000Hz
  - platform: ledc
    pin: ${led_red_pin}
    id: led_red
    frequency: 1000Hz

# =============================================================================
# Lock relay (momentary pulse, fail-secure on power loss)
# =============================================================================

switch:
  - platform: gpio
    pin: ${relay_pin}
    name: "${friendly_name} Lock Relay"
    id: lock_relay
    restore_mode: ALWAYS_OFF
    icon: "mdi:lock-open-variant"

  # Manual remote unlock from Home Assistant
  - platform: template
    name: "${friendly_name} Remote Unlock"
    id: remote_unlock
    icon: "mdi:lock-open"
    optimistic: true
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(vbat_v).state > ${vbat_cutoff};'
          then:
            - switch.turn_on: lock_relay
            - output.turn_on: led_green
            - delay: !lambda 'return ${unlock_pulse} * 1000;'
            - switch.turn_off: lock_relay
            - output.turn_off: led_green
            - homeassistant.event:
                event: esphome.fingerprint_remote_unlock
      - switch.template.publish:
          id: remote_unlock
          state: OFF

# =============================================================================
# Binary sensors - fingerprint match events (Optional - the events above
# are the primary HA integration path; these expose per-slot entities.)
# =============================================================================

binary_sensor:
  - platform: fingerprint_grow
    finger_id: 0
    name: "${friendly_name} Finger 0 (Owner)"
  - platform: fingerprint_grow
    finger_id: 1
    name: "${friendly_name} Finger 1 (Partner)"
  - platform: fingerprint_grow
    finger_id: 2
    name: "${friendly_name} Finger 2 (Guest)"

  - platform: status
    name: "${friendly_name} Status"

# =============================================================================
# Sensors - enrollment slots, capacity, battery, signal
# =============================================================================

sensor:
  - platform: fingerprint_grow
    fingerprint_count:
      name: "${friendly_name} Enrolled Count"
    last_finger_id:
      name: "${friendly_name} Last Finger ID"
    last_confidence:
      name: "${friendly_name} Last Confidence"
    status:
      name: "${friendly_name} Sensor Status"
    capacity:
      name: "${friendly_name} Capacity"
    security_level:
      name: "${friendly_name} Security Level"

  - platform: adc
    pin: ${vbat_pin}
    name: "${friendly_name} Battery Voltage"
    id: vbat_v
    attenuation: 12db
    update_interval: 60s
    unit_of_measurement: "V"
    accuracy_decimals: 2
    filters:
      # Resistor divider 100k / 100k - doubles input
      - multiply: 2.0
      - median:
          window_size: 5
          send_every: 1

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

# =============================================================================
# Enrollment helpers - call from Home Assistant developer tools
# =============================================================================

button:
  - platform: template
    name: "${friendly_name} Enroll Finger 0"
    on_press:
      - fingerprint_grow.enroll:
          finger_id: 0
          num_scans: 5

  - platform: template
    name: "${friendly_name} Enroll Finger 1"
    on_press:
      - fingerprint_grow.enroll:
          finger_id: 1
          num_scans: 5

  - platform: template
    name: "${friendly_name} Cancel Enrollment"
    on_press:
      - fingerprint_grow.cancel_enroll:

  - platform: template
    name: "${friendly_name} Delete All Fingers"
    on_press:
      - fingerprint_grow.delete_all:

  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
