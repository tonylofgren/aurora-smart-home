# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Fingerprint Door Unlock - Lovelace dashboard
# Import via: Settings > Dashboards > Add Dashboard > Import

title: Front Door
views:
  - title: Door
    path: front-door
    icon: mdi:door-closed-lock
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              # Front Door

          - type: button
            name: Remote Unlock
            icon: mdi:lock-open-variant
            entity: switch.front_door_remote_unlock
            tap_action:
              action: perform-action
              perform_action: switch.turn_on
              target:
                entity_id: switch.front_door_remote_unlock
            hold_action:
              action: more-info

      - type: entities
        title: Status
        entities:
          - entity: sensor.front_door_sensor_status
            name: Sensor
          - entity: sensor.front_door_enrolled_count
            name: Enrolled fingers
          - entity: sensor.front_door_capacity
            name: Capacity
          - entity: sensor.front_door_security_level
            name: Security level

      - type: entities
        title: Last match
        entities:
          - entity: sensor.front_door_last_finger_id
            name: Last finger ID
          - entity: sensor.front_door_last_confidence
            name: Last confidence

      - type: gauge
        entity: sensor.front_door_battery_voltage
        name: Backup battery
        min: 3.0
        max: 4.2
        severity:
          red: 3.0
          yellow: 3.5
          green: 3.8
        needle: true
        unit: V

      - type: entities
        title: Enrollment
        entities:
          - entity: button.front_door_enroll_finger_0
            name: Enroll slot 0 (Owner)
          - entity: button.front_door_enroll_finger_1
            name: Enroll slot 1 (Partner)
          - entity: button.front_door_cancel_enrollment
            name: Cancel enrollment
          - entity: button.front_door_delete_all_fingers
            name: Delete all fingers

      - type: entities
        title: Device
        entities:
          - entity: binary_sensor.front_door_status
            name: Device status
          - entity: sensor.front_door_wifi_signal
            name: WiFi signal
          - entity: button.front_door_restart
            name: Restart device
