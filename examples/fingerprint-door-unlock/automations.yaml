# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Fingerprint Door Unlock - Home Assistant automations
# Add to automations.yaml or import via the UI

# =============================================================================
# Notify on authorized fingerprint
# =============================================================================

- alias: "Front Door - Authorized Fingerprint"
  id: front_door_authorized
  description: "Notify when a known fingerprint unlocks the door"
  trigger:
    - platform: event
      event_type: esphome.fingerprint_matched
  variables:
    finger_names:
      0: "Owner"
      1: "Partner"
      2: "Guest"
    name: "{{ finger_names.get(trigger.event.data.finger_id, 'Slot ' ~ trigger.event.data.finger_id) }}"
  action:
    - service: logbook.log
      data:
        name: "Front Door"
        message: "unlocked by {{ name }} (confidence {{ trigger.event.data.confidence }})"
    - service: notify.notify
      data:
        title: "Front Door"
        message: "{{ name }} unlocked the door (confidence {{ trigger.event.data.confidence }})"

# =============================================================================
# Alert on unknown attempt - allow remote unlock
# =============================================================================

- alias: "Front Door - Unknown Fingerprint Attempt"
  id: front_door_unknown_attempt
  description: "Alert and offer remote unlock when an unknown finger is presented"
  trigger:
    - platform: event
      event_type: esphome.fingerprint_unmatched
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "Front Door - Unknown Attempt"
        message: "An unrecognized fingerprint was presented at the front door."
        data:
          actions:
            - action: "FRONT_DOOR_REMOTE_UNLOCK"
              title: "Unlock anyway"
            - action: "FRONT_DOOR_IGNORE"
              title: "Ignore"

- alias: "Front Door - Mobile Action Remote Unlock"
  id: front_door_mobile_unlock
  description: "Handle the Unlock action from the unknown-attempt notification"
  trigger:
    - platform: event
      event_type: mobile_app_notification_action
      event_data:
        action: FRONT_DOOR_REMOTE_UNLOCK
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.front_door_remote_unlock

# =============================================================================
# Battery monitoring
# =============================================================================

- alias: "Front Door - Low Battery Warning"
  id: front_door_low_battery
  description: "Notify when backup battery is getting low"
  trigger:
    - platform: numeric_state
      entity_id: sensor.front_door_battery_voltage
      below: 3.6
      for:
        minutes: 5
  action:
    - service: notify.notify
      data:
        title: "Front Door"
        message: "Backup battery low ({{ states('sensor.front_door_battery_voltage') }} V). The strike will refuse to fire below 3.4 V."

# =============================================================================
# Enrollment progress feedback
# =============================================================================

- alias: "Front Door - Enrollment Scan Progress"
  id: front_door_enroll_progress
  description: "Echo enrollment scan progress to a persistent notification"
  trigger:
    - platform: event
      event_type: esphome.fingerprint_enrollment_scan
  action:
    - service: persistent_notification.create
      data:
        notification_id: front_door_enrollment
        title: "Enrolling slot {{ trigger.event.data.finger_id }}"
        message: "Scan {{ trigger.event.data.scan_num }} of 5 captured. Lift finger and press again."

- alias: "Front Door - Enrollment Done"
  id: front_door_enroll_done
  description: "Confirm successful enrollment"
  trigger:
    - platform: event
      event_type: esphome.fingerprint_enrollment_done
  action:
    - service: persistent_notification.dismiss
      data:
        notification_id: front_door_enrollment
    - service: notify.notify
      data:
        title: "Front Door"
        message: "Fingerprint enrolled in slot {{ trigger.event.data.finger_id }}."
