# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Sendspin per-room SPEAKER device.
# Copy this file once per room and change `room_name`. Every speaker
# connects to the same hub_ip and joins the same group.
#
# The first time you flash a new room: pick a different `devicename`
# (e.g. speaker-livingroom, speaker-bedroom, speaker-kitchen).

substitutions:
  devicename: "speaker-livingroom"
  room_name: "Living Room"
  hub_ip: "192.168.1.50"           # MUST match the hub's static IP
  hub_port: "7474"
  # Per-room audio latency compensation. Start at 50 ms everywhere, then
  # if one room sounds ahead of others, raise its value in 10 ms steps.
  delay_ms: "50ms"

esphome:
  name: "${devicename}"
  friendly_name: "${room_name} Speaker"
  comment: "Sendspin per-room player"

esp32:
  board: esp32dev                  # plain ESP32 works since 2026.5.0
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# I2S bus to the DAC/amp. Adjust pins for your specific wiring.
# This is for a MAX98357A I2S amp + 4 ohm 3 W speaker (common, cheap, loud enough).
i2s_audio:
  - id: i2s_out
    i2s_lrclk_pin: GPIO25          # LRC/WS
    i2s_bclk_pin: GPIO26           # BCK

speaker:
  - platform: i2s_audio
    id: room_speaker
    i2s_audio_id: i2s_out
    dac_type: external
    i2s_dout_pin: GPIO22           # DIN on the amp
    channel: mono                  # Use stereo + a second amp for true stereo per room

# Sendspin per-room player. Points back at the hub.
media_player:
  - platform: sendspin
    name: "${room_name} Speaker"
    hub_host: "${hub_ip}"
    hub_port: ${hub_port}
    speaker_id: room_speaker
    delay_compensation: "${delay_ms}"

sensor:
  - platform: uptime
    name: "${room_name} Speaker uptime"
    update_interval: 60s

switch:
  - platform: restart
    name: "${room_name} Speaker restart"
