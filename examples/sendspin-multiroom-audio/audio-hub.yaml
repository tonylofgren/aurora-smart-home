# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Sendspin audio HUB device.
# This is the one device that runs the Sendspin server, exposes the group
# media_player to Home Assistant, and distributes audio to per-room
# speakers across the LAN. New in ESPHome 2026.5.0.
#
# Flash exactly ONE hub on your network. Flash any number of speakers
# (see speaker.yaml).

substitutions:
  devicename: "audio-hub"
  long_devicename: "Audio Hub"
  hub_ip: "192.168.1.50"          # MUST be the static IP your DHCP assigns this device
  hub_port: "7474"                # Default Sendspin port

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "Sendspin audio hub (group controller)"

esp32:
  board: esp32-s3-devkitc-1       # PSRAM helps a lot for Opus decoding
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Lock to a static IP - Sendspin speakers will reach the hub at this IP.
  manual_ip:
    static_ip: "${hub_ip}"
    gateway: !secret network_gateway
    subnet: !secret network_subnet
    dns1: !secret network_dns
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# Sendspin hub. The host: IP must match the static_ip above.
sendspin:
  host: "${hub_ip}"
  port: ${hub_port}

# Group media_player. This is the entity users press play on in HA.
# Pressing play here starts synchronized playback on every joined speaker.
media_player:
  - platform: sendspin_group
    name: "${long_devicename} - All Rooms"

# Track metadata sensors. Useful for an "is something playing right now?"
# automation and for showing the current track on dashboards.
sensor:
  - platform: sendspin
    track_progress:
      name: "${long_devicename} progress"

  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s

text_sensor:
  - platform: sendspin
    title:
      name: "${long_devicename} now playing title"
    artist:
      name: "${long_devicename} now playing artist"
    album:
      name: "${long_devicename} now playing album"

switch:
  - platform: restart
    name: "${long_devicename} restart"
