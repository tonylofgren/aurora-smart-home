# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# EV charger monitor and controller.
#
# Default target: OpenEVSE (open-source charger with an HTTP REST API on
# port 80). The ESP32 polls /status every 10 s, parses the JSON, and exposes
# live charging metrics + max-amperage control to Home Assistant.
#
# Wallbox, Easee, and Zaptec all expose similar JSON or Modbus endpoints;
# see README.md for the field mapping and the variants to change here.

substitutions:
  devicename: "ev-charger-monitor"
  long_devicename: "EV Charger Monitor"

  # OpenEVSE base URL on the local LAN. http://openevse.local also works
  # if mDNS resolves on the ESP32.
  charger_host: "http://192.168.1.50"

  # OpenEVSE HTTP Basic auth (default user is 'openevse', no password).
  # Override in secrets.yaml if you set credentials in the OpenEVSE UI.
  charger_user: "openevse"

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "OpenEVSE HTTP poller and controller"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

# Optional Ethernet for a stable link to the charging station.
# Uncomment if you have a W5500 SPI module wired up.
#
# ethernet:
#   type: W5500
#   clk_pin: GPIO18
#   mosi_pin: GPIO23
#   miso_pin: GPIO19
#   cs_pin: GPIO5
#   interrupt_pin: GPIO33
#   reset_pin: GPIO26

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

time:
  - platform: homeassistant
    id: ha_time

# =============================================================================
# HTTP client used for every charger request
# =============================================================================

http_request:
  id: charger_http
  useragent: "esphome/ev-charger-monitor"
  timeout: 5s
  verify_ssl: false

# =============================================================================
# Polling: GET ${charger_host}/status every 10 s, store the JSON body
# =============================================================================

interval:
  - interval: 10s
    then:
      - http_request.get:
          url: "${charger_host}/status"
          headers:
            Authorization: !lambda |-
              return std::string("Basic ") + id(basic_auth_header).c_str();
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  id(last_status_body) = body;
              - component.update: charge_state_text
              - component.update: session_kwh_sensor
              - component.update: session_time_sensor
              - component.update: current_amps_sensor
              - component.update: voltage_sensor
              - component.update: real_power_sensor
              - component.update: lifetime_kwh_sensor

globals:
  - id: last_status_body
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: basic_auth_header
    type: std::string
    restore_value: no
    # Pre-computed base64 of "openevse:" (default OpenEVSE creds, no password).
    # Replace if you set a password in the OpenEVSE UI.
    initial_value: '"b3BlbmV2c2U6"'

# =============================================================================
# Parsed metrics from the OpenEVSE /status JSON
#
# OpenEVSE field reference:
#   state          -> integer; 0 unknown, 1 not connected, 2 connected,
#                     3 charging, 4 vent required, 5 diode check failed,
#                     6 GFI fault, 7 no ground, 8 stuck relay, 254 sleeping
#   session_energy -> Wh in the current session
#   session_elapsed-> seconds since session start
#   amp            -> milliamps measured during charging
#   voltage        -> volts measured by OpenEVSE
#   wattsec/watthour, total_energy -> lifetime kWh accumulator
# =============================================================================

text_sensor:
  - platform: template
    id: charge_state_text
    name: "${long_devicename} state"
    icon: mdi:ev-station
    update_interval: never
    lambda: |-
      const std::string &b = id(last_status_body);
      int n = 0;
      auto p = b.find("\"state\":");
      if (p == std::string::npos) return {"unknown"};
      n = atoi(b.c_str() + p + 8);
      switch (n) {
        case 1: return {"not_connected"};
        case 2: return {"connected"};
        case 3: return {"charging"};
        case 4: return {"vent_required"};
        case 5: return {"diode_check_failed"};
        case 6: return {"gfi_fault"};
        case 7: return {"no_ground"};
        case 8: return {"stuck_relay"};
        case 254: return {"sleeping"};
        default: return {"unknown"};
      }

  - platform: version
    name: "${long_devicename} ESPHome version"
    entity_category: diagnostic

sensor:
  - platform: template
    id: session_kwh_sensor
    name: "${long_devicename} session energy"
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    update_interval: never
    lambda: |-
      const std::string &b = id(last_status_body);
      auto p = b.find("\"session_energy\":");
      if (p == std::string::npos) return NAN;
      return atof(b.c_str() + p + 17) / 1000.0;

  - platform: template
    id: session_time_sensor
    name: "${long_devicename} session time"
    unit_of_measurement: "s"
    device_class: duration
    state_class: measurement
    update_interval: never
    lambda: |-
      const std::string &b = id(last_status_body);
      auto p = b.find("\"session_elapsed\":");
      if (p == std::string::npos) return NAN;
      return atof(b.c_str() + p + 18);

  - platform: template
    id: current_amps_sensor
    name: "${long_devicename} current"
    unit_of_measurement: "A"
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    update_interval: never
    lambda: |-
      const std::string &b = id(last_status_body);
      auto p = b.find("\"amp\":");
      if (p == std::string::npos) return NAN;
      return atof(b.c_str() + p + 6) / 1000.0;

  - platform: template
    id: voltage_sensor
    name: "${long_devicename} voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    update_interval: never
    lambda: |-
      const std::string &b = id(last_status_body);
      auto p = b.find("\"voltage\":");
      if (p == std::string::npos) return NAN;
      return atof(b.c_str() + p + 10);

  - platform: template
    id: real_power_sensor
    name: "${long_devicename} power"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    update_interval: never
    lambda: |-
      float a = id(current_amps_sensor).state;
      float v = id(voltage_sensor).state;
      if (isnan(a) || isnan(v)) return NAN;
      return a * v;

  - platform: template
    id: lifetime_kwh_sensor
    name: "${long_devicename} lifetime energy"
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    update_interval: never
    lambda: |-
      const std::string &b = id(last_status_body);
      auto p = b.find("\"total_energy\":");
      if (p == std::string::npos) return NAN;
      return atof(b.c_str() + p + 15);

  - platform: wifi_signal
    name: "${long_devicename} WiFi"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "${long_devicename} uptime"
    entity_category: diagnostic

# =============================================================================
# Max amperage (0-32 A). POSTs to /override on OpenEVSE.
# =============================================================================

number:
  - platform: template
    id: max_amp_number
    name: "${long_devicename} max amps"
    icon: mdi:current-ac
    optimistic: true
    min_value: 0
    max_value: 32
    step: 1
    unit_of_measurement: "A"
    mode: slider
    initial_value: 16
    set_action:
      - http_request.post:
          url: "${charger_host}/override"
          headers:
            Authorization: !lambda |-
              return std::string("Basic ") + id(basic_auth_header).c_str();
            Content-Type: "application/json"
          body: !lambda |-
            char buf[64];
            snprintf(buf, sizeof(buf), "{\"charge_current\":%d}", (int) x);
            return std::string(buf);

# =============================================================================
# Sleep / wake the charger via POST /override
# =============================================================================

switch:
  - platform: template
    name: "${long_devicename} enable"
    icon: mdi:power
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - http_request.post:
          url: "${charger_host}/override"
          headers:
            Authorization: !lambda |-
              return std::string("Basic ") + id(basic_auth_header).c_str();
            Content-Type: "application/json"
          body: '{"state":"active"}'
    turn_off_action:
      - http_request.post:
          url: "${charger_host}/override"
          headers:
            Authorization: !lambda |-
              return std::string("Basic ") + id(basic_auth_header).c_str();
            Content-Type: "application/json"
          body: '{"state":"disabled"}'

  - platform: restart
    name: "${long_devicename} restart"
    entity_category: config

binary_sensor:
  - platform: template
    name: "${long_devicename} charging"
    device_class: power
    lambda: |-
      auto s = id(charge_state_text).state;
      return s == "charging";

  - platform: template
    name: "${long_devicename} vehicle connected"
    device_class: plug
    lambda: |-
      auto s = id(charge_state_text).state;
      return s == "connected" || s == "charging";

  - platform: status
    name: "${long_devicename} status"
