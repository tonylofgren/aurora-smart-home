# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Bluetooth Proxy optimised for proxying Yale/August locks (and any other
# device that suffers from BLE/WiFi coex problems under heavy WiFi load).
#
# Key 2026.5.0 features used:
# - The BLE tracker coex fix (status=133 GATT failures resolved)
# - esp32_ble: use_psram (frees ~40 kB internal RAM for the proxy task)
# - esp32: watchdog_timeout (longer watchdog window for active connections)

substitutions:
  devicename: "bt-proxy-livingroom"
  long_devicename: "BT Proxy Living Room"

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "Bluetooth proxy optimised for Yale/August locks"

esp32:
  board: esp-wrover-kit            # WROVER has PSRAM. ESP32-S3 with PSRAM also works.
  framework:
    type: esp-idf                  # ESP-IDF is the right choice for stable BLE proxy
  watchdog_timeout: 15s            # 2026.5.0+ knob - longer than default 5s
                                   # gives BLE active connections more headroom

# Free ~40 kB of internal RAM by moving Bluedroid into SPIRAM (2026.5.0+).
psram:
  mode: quad
  speed: 80MHz

esp32_ble:
  use_psram: true                  # 2026.5.0+

# Bluetooth tracker tuned for active connection workloads. The default scan
# parameters work, but we widen the active scanning window to catch the
# initial connection request from a slow-advertising device.
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

# Bluetooth proxy with active connection support enabled - required for
# locks, thermostats, and any other device that needs GATT writes.
bluetooth_proxy:
  active: true
  cache_services: true             # speeds up reconnect after a brief loss

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE            # Full WiFi performance. The 2026.5.0 coex
                                   # fix takes care of BT priority during
                                   # active GATT operations.
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  # Bluetooth logging is noisy. Crank it up to DEBUG only when debugging
  # a specific lock.
  logs:
    bluetooth_proxy: WARN
    esp32_ble_tracker: WARN

# Diagnostics: shows WiFi signal at the proxy location (matters a lot for
# placement) and uptime so you can see if it's been quietly rebooting.
sensor:
  - platform: wifi_signal
    name: "${long_devicename} WiFi signal"
    update_interval: 60s
  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "${long_devicename} status"

text_sensor:
  - platform: version
    name: "${long_devicename} ESPHome version"
  - platform: wifi_info
    ip_address:
      name: "${long_devicename} IP address"

switch:
  - platform: restart
    name: "${long_devicename} restart"
