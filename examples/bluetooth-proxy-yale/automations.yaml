# Bluetooth Proxy Automations for Home Assistant

# =============================================================================
# Proxy went offline alert
# =============================================================================

- alias: "BT Proxy - Offline alert"
  id: bt_proxy_offline
  description: "Notify if the proxy goes offline for 5+ minutes"
  triggers:
    - trigger: state
      entity_id: binary_sensor.bt_proxy_living_room_status
      to: "off"
      for:
        minutes: 5
  actions:
    - action: notify.notify
      data:
        title: "Bluetooth Proxy"
        message: "Living room proxy went offline. Lock may be unreachable."

# =============================================================================
# Weak WiFi signal warning (placement health check)
# =============================================================================

- alias: "BT Proxy - Weak WiFi signal"
  id: bt_proxy_weak_wifi
  description: "Suggest moving the proxy if WiFi RSSI is consistently bad"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.bt_proxy_living_room_wifi_signal
      below: -70
      for:
        minutes: 30
  actions:
    - action: notify.notify
      data:
        title: "Bluetooth Proxy"
        message: >
          WiFi signal at the proxy is {{ states('sensor.bt_proxy_living_room_wifi_signal') }} dBm.
          Move the proxy closer to the AP for reliable lock operation.

# =============================================================================
# Lock + proxy correlation: alert if proxy is online but lock unreachable
# =============================================================================

- alias: "BT Proxy - Lock unreachable despite proxy online"
  id: bt_proxy_lock_unreachable
  description: "Catch cases where the proxy is fine but the lock dropped"
  triggers:
    - trigger: state
      entity_id: lock.front_door
      to: "unavailable"
      for:
        minutes: 10
  conditions:
    - condition: state
      entity_id: binary_sensor.bt_proxy_living_room_status
      state: "on"
  actions:
    - action: notify.notify
      data:
        title: "Front Door Lock"
        message: >
          Proxy is online but lock is unreachable. Likely a lock battery
          issue (Yale/August locks brown out before formally dying).

# =============================================================================
# Auto-restart if uptime keeps resetting (proxy crashing loop)
# =============================================================================

- alias: "BT Proxy - Crash loop detection"
  id: bt_proxy_crash_loop
  description: "If uptime stays under 30 min for an hour, something is wrong"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.bt_proxy_living_room_uptime
      below: 1800        # 30 min in seconds
      for:
        minutes: 60
  actions:
    - action: notify.notify
      data:
        title: "Bluetooth Proxy"
        message: >
          Proxy appears to be in a crash/restart loop. Check power supply
          and WiFi signal. Consider OTA reflash.
