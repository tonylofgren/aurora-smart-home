# Battery Temperature & Humidity Sensor
# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Hardware:
#   - Seeed Studio XIAO ESP32-C3
#   - Sensirion SHT40 (I2C temperature + humidity)
#   - LiPo 2000 mAh (or 2x AA via boost converter)
#   - Optional: 1:1 voltage divider (2x 100k) on GPIO4 for battery monitoring
#   - Optional: stay-awake button on BOOT pin (GPIO9)
#
# Power profile:
#   - Wakes every 10 min, reads sensor, publishes, sleeps
#   - Expected battery life: 6-12 months on 2000 mAh LiPo

substitutions:
  device_name: "battery-temp-sensor"
  friendly_name: "Battery Temp Sensor"

  # I2C pins (Xiao ESP32-C3 default)
  sda_pin: "GPIO6"
  scl_pin: "GPIO7"

  # Battery monitoring (1:1 divider on GPIO4)
  battery_adc_pin: "GPIO4"

  # Stay-awake button (BOOT button on Xiao)
  wake_button_pin: "GPIO9"

  # Sleep interval
  sleep_interval: "10min"

  # Maximum time awake before forced sleep (failsafe)
  run_duration: "30s"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    # Priority -100 = runs after WiFi/API are up
    priority: -100
    then:
      - logger.log: "Boot complete, taking reading"
      - component.update: sht40
      - component.update: battery_voltage
      - delay: 3s
      # Only sleep if stay-awake is not held
      - if:
          condition:
            binary_sensor.is_off: stay_awake
          then:
            - logger.log: "Entering deep sleep"
            - deep_sleep.enter: deep_sleep_control
          else:
            - logger.log: "Stay-awake active, staying online"

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Faster reconnect using stored credentials
  fast_connect: true
  ap:
    ssid: "${device_name}-fallback"
    password: !secret ap_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  # Reduce serial logging power draw during normal operation
  baud_rate: 0

# =============================================================================
# Deep Sleep
# =============================================================================

deep_sleep:
  id: deep_sleep_control
  run_duration: ${run_duration}
  sleep_duration: ${sleep_interval}
  # Optional: wake on button press (active low)
  wakeup_pin:
    number: ${wake_button_pin}
    inverted: true
  wakeup_pin_mode: INVERT_WAKEUP

# =============================================================================
# I2C Bus (SHT40)
# =============================================================================

i2c:
  sda: ${sda_pin}
  scl: ${scl_pin}
  scan: true
  frequency: 100kHz

# =============================================================================
# Sensors
# =============================================================================

sensor:
  # Temperature & Humidity (SHT40)
  - platform: sht4x
    id: sht40
    address: 0x44
    update_interval: never  # Triggered manually from on_boot
    temperature:
      name: "${friendly_name} Temperature"
      id: temperature
      accuracy_decimals: 2
      filters:
        - offset: 0.0  # Calibrate against reference if needed
    humidity:
      name: "${friendly_name} Humidity"
      id: humidity
      accuracy_decimals: 1

  # Battery voltage (1:1 divider on ADC pin)
  - platform: adc
    id: battery_voltage
    pin:
      number: ${battery_adc_pin}
      allow_other_uses: false
    name: "${friendly_name} Battery Voltage"
    update_interval: never  # Triggered manually
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    filters:
      # 1:1 divider: ADC reads half of battery voltage
      - multiply: 2.0
      - median:
          window_size: 5
          send_every: 1

  # Battery percentage (LiPo curve, 3.3V empty - 4.2V full)
  - platform: template
    name: "${friendly_name} Battery"
    id: battery_percent
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      float pct = (v - 3.3) / (4.2 - 3.3) * 100.0;
      if (pct > 100) pct = 100;
      if (pct < 0) pct = 0;
      return pct;
    update_interval: 60s

  # WiFi diagnostics
  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

  # Uptime per wake cycle (useful to detect sleep regressions)
  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 30s
    entity_category: diagnostic

# =============================================================================
# Binary Sensors
# =============================================================================

binary_sensor:
  # Stay-awake button (BOOT). Hold while powering on to keep sensor online for OTA.
  - platform: gpio
    pin:
      number: ${wake_button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Stay Awake"
    id: stay_awake
    entity_category: diagnostic
    on_press:
      then:
        - logger.log: "Stay-awake pressed, preventing sleep"
        - deep_sleep.prevent: deep_sleep_control

# =============================================================================
# Buttons & Switches
# =============================================================================

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: diagnostic

switch:
  # Software override: prevent deep sleep until next reboot
  - platform: template
    name: "${friendly_name} Prevent Sleep"
    id: prevent_sleep
    entity_category: config
    optimistic: true
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_control
    turn_off_action:
      - deep_sleep.allow: deep_sleep_control

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
