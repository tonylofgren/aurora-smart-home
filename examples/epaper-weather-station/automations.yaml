# =============================================================================
# Low Battery Warning
# =============================================================================

- alias: "E-Paper Weather - Low Battery"
  id: epaper_weather_low_battery
  description: "Notify when display battery drops below 20%"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.epaper_weather_battery
      below: 20
      for:
        minutes: 30
  actions:
    - action: notify.notify
      data:
        title: "Weather Display"
        message: >
          Battery is at {{ states('sensor.epaper_weather_battery') }}%
          ({{ states('sensor.epaper_weather_battery_voltage') }} V).
          Time to recharge.

# =============================================================================
# Force refresh when severe weather arrives
# E-paper updates hourly by default - force a redraw on big changes.
# =============================================================================

- alias: "E-Paper Weather - Refresh on Severe Weather"
  id: epaper_weather_refresh_severe
  description: "Push immediate redraw when conditions change to stormy"
  triggers:
    - trigger: state
      entity_id: weather.home
      to:
        - "lightning"
        - "lightning-rainy"
        - "pouring"
  actions:
    - action: button.press
      target:
        entity_id: button.epaper_weather_refresh_now

# =============================================================================
# Stale display detection
# =============================================================================

- alias: "E-Paper Weather - Stale Display"
  id: epaper_weather_stale
  description: "Alert if display has not woken in 3 hours"
  triggers:
    - trigger: state
      entity_id: sensor.epaper_weather_battery_voltage
      to: "unavailable"
      for:
        hours: 3
  actions:
    - action: notify.notify
      data:
        title: "Weather Display Offline"
        message: >
          The e-paper has not reported in 3 hours.
          Battery may be empty or WiFi may be out of range.
