# E-Paper Weather Station
# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Hardware:
#   - ESP32-WROOM-32 dev board (any 38-pin variant)
#   - Waveshare 3.97" e-paper (800x480, SSD1683) - new driver in ESPHome 2026.5.0
#   - Alternative: Goodisplay GDEY042T81 4.2" e-paper (400x300, also SSD1683)
#   - LiPo battery 2000-3000 mAh with TP4056 charger module
#   - Optional: BME280 onboard for indoor reference readings
#
# Power profile:
#   - Wakes every 60 min, pulls weather from HA, redraws screen, sleeps
#   - Expected battery life: 12-18 months on 3000 mAh LiPo
#   - E-paper retains the image while ESP sleeps (zero draw at rest)
#
# Requires Home Assistant entities:
#   - sensor.outdoor_temperature
#   - sensor.outdoor_humidity
#   - weather.home (any weather integration: Met.no, OpenWeatherMap, SMHI)
#   - sensor.wind_speed (optional)

substitutions:
  device_name: "epaper-weather-station"
  friendly_name: "E-Paper Weather"

  # SPI pins (default Waveshare ESP32 e-paper wiring)
  spi_clk_pin: "GPIO18"
  spi_mosi_pin: "GPIO23"
  cs_pin: "GPIO5"
  dc_pin: "GPIO17"
  reset_pin: "GPIO16"
  busy_pin: "GPIO4"

  # Battery monitoring (1:1 divider on GPIO35)
  battery_adc_pin: "GPIO35"

  # Refresh interval - hourly is plenty for weather
  sleep_interval: "60min"
  run_duration: "60s"

  # Home Assistant sensor entity IDs (override here, no YAML edits needed elsewhere)
  ha_temp_entity: "sensor.outdoor_temperature"
  ha_humidity_entity: "sensor.outdoor_humidity"
  ha_weather_entity: "weather.home"
  ha_wind_entity: "sensor.wind_speed"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - logger.log: "Boot complete, waiting for HA data"
      # Give the HA API a few seconds to push the latest sensor values
      - delay: 8s
      - component.update: epaper
      - delay: 5s
      - if:
          condition:
            switch.is_off: prevent_sleep
          then:
            - logger.log: "Entering deep sleep"
            - deep_sleep.enter: deep_sleep_control
          else:
            - logger.log: "Stay-awake active"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "${device_name}-fallback"
    password: !secret ap_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0

# =============================================================================
# Deep Sleep - the secret to year-scale battery life
# =============================================================================

deep_sleep:
  id: deep_sleep_control
  run_duration: ${run_duration}
  sleep_duration: ${sleep_interval}

# =============================================================================
# SPI Bus for E-Paper Display
# =============================================================================

spi:
  clk_pin: ${spi_clk_pin}
  mosi_pin: ${spi_mosi_pin}

# =============================================================================
# Fonts - downloaded automatically from Google Fonts CDN by ESPHome
# =============================================================================

font:
  # Large display font for the current temperature (e.g. "12 C")
  - file:
      type: gfonts
      family: "Roboto"
      weight: 700
    id: font_huge
    size: 96

  # Medium for forecast highs/lows and section headings
  - file:
      type: gfonts
      family: "Roboto"
      weight: 500
    id: font_medium
    size: 32

  # Small for timestamps and footer
  - file:
      type: gfonts
      family: "Roboto"
      weight: 400
    id: font_small
    size: 18

  # Weather icons via Material Design Icons font
  # The community pack ships glyph aliases via the `glyphs:` map below.
  - file:
      type: gfonts
      family: "Material Symbols Outlined"
    id: font_icons
    size: 72
    glyphs:
      - "\U0000e81a"   # wb_sunny  (sunny)
      - "\U0000e2bd"   # cloud (cloudy)
      - "\U0000f176"   # partly_cloudy_day
      - "\U0000f67f"   # rainy
      - "\U0000ebd3"   # thunderstorm
      - "\U0000e2cd"   # ac_unit (snow)
      - "\U0000e818"   # foggy
      - "\U0000e1b8"   # device_thermostat

# =============================================================================
# Time source (used for timestamp footer)
# =============================================================================

time:
  - platform: homeassistant
    id: ha_time

# =============================================================================
# Pull-through sensors from Home Assistant
# =============================================================================

sensor:
  - platform: homeassistant
    id: outdoor_temp
    entity_id: ${ha_temp_entity}
    internal: true

  - platform: homeassistant
    id: outdoor_humidity
    entity_id: ${ha_humidity_entity}
    internal: true

  - platform: homeassistant
    id: wind_speed
    entity_id: ${ha_wind_entity}
    internal: true

  # Forecast highs/lows (template sensors in HA - see automations.yaml)
  - platform: homeassistant
    id: forecast_today_high
    entity_id: sensor.forecast_today_high
    internal: true

  - platform: homeassistant
    id: forecast_today_low
    entity_id: sensor.forecast_today_low
    internal: true

  - platform: homeassistant
    id: forecast_tomorrow_high
    entity_id: sensor.forecast_tomorrow_high
    internal: true

  - platform: homeassistant
    id: forecast_tomorrow_low
    entity_id: sensor.forecast_tomorrow_low
    internal: true

  - platform: homeassistant
    id: forecast_day3_high
    entity_id: sensor.forecast_day3_high
    internal: true

  - platform: homeassistant
    id: forecast_day3_low
    entity_id: sensor.forecast_day3_low
    internal: true

  # Battery voltage via 1:1 divider
  - platform: adc
    id: battery_voltage
    pin: ${battery_adc_pin}
    name: "${friendly_name} Battery Voltage"
    attenuation: 12db
    update_interval: 30s
    accuracy_decimals: 3
    unit_of_measurement: "V"
    device_class: voltage
    filters:
      - multiply: 2.0

  - platform: template
    name: "${friendly_name} Battery"
    id: battery_percent
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      float pct = (v - 3.3) / (4.2 - 3.3) * 100.0;
      if (pct > 100) pct = 100;
      if (pct < 0) pct = 0;
      return pct;
    update_interval: 60s

  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

# Weather state string from HA (sunny, cloudy, rainy, ...)
text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: ${ha_weather_entity}
    internal: true

  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic

# =============================================================================
# E-Paper Display
# =============================================================================
# 2026.5.0 added the SSD1683 driver to the new epaper_spi platform.
# For 4.2" GDEY042T81, change model to "4.20in-bw-ssd1683".

display:
  - platform: epaper_spi
    id: epaper
    model: "3.97in-bw-ssd1683"
    cs_pin: ${cs_pin}
    dc_pin: ${dc_pin}
    reset_pin: ${reset_pin}
    busy_pin: ${busy_pin}
    update_interval: never   # We trigger redraws from on_boot
    rotation: 0
    lambda: |-
      // Layout for 800 x 480 portrait/landscape (landscape default)
      // Left half (0-400): current conditions
      // Right half (400-800): 3-day forecast
      // Bottom strip (450-480): footer

      // ---- Left column: current conditions ----
      it.printf(20, 10, id(font_small), "NOW");

      // Weather icon (mapped from state string)
      const char* state = id(weather_state).has_state() ? id(weather_state).state.c_str() : "";
      const char* icon = "\U0000e2bd"; // default cloud
      if (strcmp(state, "sunny") == 0)             icon = "\U0000e81a";
      else if (strcmp(state, "partlycloudy") == 0) icon = "\U0000f176";
      else if (strcmp(state, "rainy") == 0 ||
               strcmp(state, "pouring") == 0)      icon = "\U0000f67f";
      else if (strcmp(state, "lightning") == 0 ||
               strcmp(state, "lightning-rainy") == 0) icon = "\U0000ebd3";
      else if (strcmp(state, "snowy") == 0)        icon = "\U0000e2cd";
      else if (strcmp(state, "fog") == 0)          icon = "\U0000e818";
      it.printf(20, 40, id(font_icons), "%s", icon);

      // Big current temperature
      if (id(outdoor_temp).has_state()) {
        it.printf(180, 60, id(font_huge), "%.0f", id(outdoor_temp).state);
        it.printf(360, 80, id(font_medium), "C");
      } else {
        it.printf(180, 60, id(font_huge), "--");
      }

      // Humidity + wind line
      it.printf(20, 200, id(font_medium), "Humidity:  %.0f%%",
                id(outdoor_humidity).has_state() ? id(outdoor_humidity).state : 0.0f);
      it.printf(20, 240, id(font_medium), "Wind:  %.1f m/s",
                id(wind_speed).has_state() ? id(wind_speed).state : 0.0f);

      // Vertical divider
      it.line(400, 10, 400, 440);

      // ---- Right column: 3-day forecast ----
      it.printf(420, 10, id(font_small), "FORECAST");

      struct Row { int y; const char* label; float hi; float lo; };
      Row rows[3] = {
        {  50, "Today",
           id(forecast_today_high).has_state() ? id(forecast_today_high).state : NAN,
           id(forecast_today_low).has_state()  ? id(forecast_today_low).state  : NAN },
        { 170, "Tomorrow",
           id(forecast_tomorrow_high).has_state() ? id(forecast_tomorrow_high).state : NAN,
           id(forecast_tomorrow_low).has_state()  ? id(forecast_tomorrow_low).state  : NAN },
        { 290, "Day +2",
           id(forecast_day3_high).has_state() ? id(forecast_day3_high).state : NAN,
           id(forecast_day3_low).has_state()  ? id(forecast_day3_low).state  : NAN },
      };
      for (int i = 0; i < 3; i++) {
        it.printf(420, rows[i].y, id(font_medium), "%s", rows[i].label);
        if (!isnan(rows[i].hi) && !isnan(rows[i].lo)) {
          it.printf(420, rows[i].y + 40, id(font_medium),
                    "Hi %.0f / Lo %.0f", rows[i].hi, rows[i].lo);
        } else {
          it.printf(420, rows[i].y + 40, id(font_medium), "--");
        }
      }

      // ---- Footer: timestamp and battery ----
      it.line(0, 450, 800, 450);
      auto now = id(ha_time).now();
      it.strftime(20, 458, id(font_small),
                  "Updated: %Y-%m-%d %H:%M", now);
      it.printf(620, 458, id(font_small), "Battery: %.0f%%",
                id(battery_percent).has_state() ? id(battery_percent).state : 0.0f);

# =============================================================================
# Switches - manual override controls
# =============================================================================

switch:
  - platform: template
    name: "${friendly_name} Prevent Sleep"
    id: prevent_sleep
    entity_category: config
    optimistic: true
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_control
    turn_off_action:
      - deep_sleep.allow: deep_sleep_control

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: diagnostic

  - platform: template
    name: "${friendly_name} Refresh Now"
    entity_category: config
    on_press:
      - component.update: epaper
