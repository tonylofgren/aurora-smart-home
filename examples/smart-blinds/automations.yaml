# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Smart Blinds Automations for Home Assistant
# Add to your automations.yaml or via UI

# =============================================================================
# Open blinds at sunrise
# =============================================================================

- alias: "Blinds - Open at Sunrise"
  id: blinds_sunrise_open
  description: "Open blinds when the sun rises"
  triggers:
    - trigger: sun
      event: sunrise
      offset: "+00:15:00"
  conditions:
    - condition: state
      entity_id: cover.blinds
      state: "closed"
  actions:
    - action: cover.open_cover
      target:
        entity_id: cover.blinds

# =============================================================================
# Close blinds at sunset
# =============================================================================

- alias: "Blinds - Close at Sunset"
  id: blinds_sunset_close
  description: "Close blinds at sunset for privacy"
  triggers:
    - trigger: sun
      event: sunset
      offset: "-00:10:00"
  conditions:
    - condition: state
      entity_id: cover.blinds
      state: "open"
  actions:
    - action: cover.close_cover
      target:
        entity_id: cover.blinds

# =============================================================================
# Close blinds when it gets too hot (heat protection)
# =============================================================================

- alias: "Blinds - Close on Heat"
  id: blinds_heat_close
  description: "Close blinds when room overheats during the day"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.living_room_temperature
      above: 26
      for:
        minutes: 5
  conditions:
    - condition: sun
      after: sunrise
      before: sunset
    - condition: state
      entity_id: cover.blinds
      state: "open"
  actions:
    - action: cover.close_cover
      target:
        entity_id: cover.blinds
    - action: notify.notify
      data:
        title: "Blinds"
        message: "Closing blinds - room is {{ states('sensor.living_room_temperature') }}C"

# =============================================================================
# Endstop alert - motor jammed before reaching limit
# =============================================================================

- alias: "Blinds - Motor Jam Alert"
  id: blinds_jam_alert
  description: "Alert if cover state stuck on opening/closing too long"
  triggers:
    - trigger: state
      entity_id: cover.blinds
      to: "opening"
      for:
        minutes: 2
    - trigger: state
      entity_id: cover.blinds
      to: "closing"
      for:
        minutes: 2
  actions:
    - action: cover.stop_cover
      target:
        entity_id: cover.blinds
    - action: notify.notify
      data:
        title: "Blinds - Motor Jam"
        message: "Blinds did not reach endstop. Check for obstruction."
