# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Smart Blinds Controller
# Motorized window blinds with position memory, endstop calibration,
# and local button control.
#
# Two motor variants are provided below - pick ONE and delete the other:
#   1. 28BYJ-48 + ULN2003  (cheap, weak, fine for light roller shades)
#   2. NEMA17  + A4988     (stronger, blackout / heavy curtains)
#
# Both share the same cover, endstops, button, and position memory.

substitutions:
  device_name: "smart-blinds"
  friendly_name: "Blinds"

  # ---- Pins (adjust to your wiring) ----
  endstop_open_pin: "GPIO32"
  endstop_close_pin: "GPIO33"
  button_up_pin: "GPIO25"
  button_down_pin: "GPIO26"
  button_stop_pin: "GPIO27"

  # 28BYJ-48 / ULN2003 pins (variant 1)
  uln_pin_a: "GPIO14"
  uln_pin_b: "GPIO12"
  uln_pin_c: "GPIO13"
  uln_pin_d: "GPIO15"

  # A4988 pins (variant 2)
  a4988_step_pin: "GPIO18"
  a4988_dir_pin:  "GPIO19"
  a4988_enable_pin: "GPIO21"

  # ---- Calibration (set after timing your motor) ----
  # See README: time how long full closed -> full open takes.
  open_duration:  "20s"
  close_duration: "20s"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# =============================================================================
# Globals - position memory (survives reboot via NVS)
# =============================================================================

globals:
  - id: blind_position
    type: float
    restore_value: yes
    initial_value: "0.0"

# =============================================================================
# Endstop switches (safety - stop motor at limits)
# =============================================================================

binary_sensor:
  - platform: gpio
    pin:
      number: ${endstop_open_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Endstop Open"
    id: endstop_open
    device_class: opening
    filters:
      - delayed_on: 30ms
    on_press:
      - cover.stop: blinds_cover
      - logger.log: "Endstop OPEN reached - motor halted"

  - platform: gpio
    pin:
      number: ${endstop_close_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Endstop Closed"
    id: endstop_close
    device_class: opening
    filters:
      - delayed_on: 30ms
    on_press:
      - cover.stop: blinds_cover
      - logger.log: "Endstop CLOSED reached - motor halted"

  # Local control buttons
  - platform: gpio
    pin:
      number: ${button_up_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Button Up"
    on_press:
      - cover.open: blinds_cover

  - platform: gpio
    pin:
      number: ${button_down_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Button Down"
    on_press:
      - cover.close: blinds_cover

  - platform: gpio
    pin:
      number: ${button_stop_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Button Stop"
    on_press:
      - cover.stop: blinds_cover

  - platform: status
    name: "${friendly_name} Status"

# =============================================================================
# Stepper motor - VARIANT 1: 28BYJ-48 + ULN2003
# Comment this block out and use the A4988 block below for NEMA17.
# =============================================================================

stepper:
  - platform: uln2003
    id: blind_motor
    pin_a: ${uln_pin_a}
    pin_b: ${uln_pin_b}
    pin_c: ${uln_pin_c}
    pin_d: ${uln_pin_d}
    sleep_when_done: true
    step_mode: HALF_STEP
    max_speed: 250 steps/s
    acceleration: inf
    deceleration: inf

# ---- VARIANT 2: NEMA17 + A4988 ----
# Replace the stepper block above with this one for heavy curtains:
#
# stepper:
#   - platform: a4988
#     id: blind_motor
#     step_pin: ${a4988_step_pin}
#     dir_pin: ${a4988_dir_pin}
#     sleep_pin:
#       number: ${a4988_enable_pin}
#       inverted: true
#     max_speed: 800 steps/s
#     acceleration: 500 steps/s^2
#     deceleration: 500 steps/s^2

# =============================================================================
# Cover - time-based (uses calibrated open/close durations)
# =============================================================================

cover:
  - platform: time_based
    name: "${friendly_name}"
    id: blinds_cover
    device_class: shade
    open_action:
      - logger.log: "Opening blinds"
      - stepper.set_target:
          id: blind_motor
          target: 4096
    open_duration: ${open_duration}

    close_action:
      - logger.log: "Closing blinds"
      - stepper.set_target:
          id: blind_motor
          target: 0
    close_duration: ${close_duration}

    stop_action:
      - logger.log: "Stopping motor"
      - stepper.set_target:
          id: blind_motor
          target: !lambda "return id(blind_motor).current_position;"

    has_built_in_endstop: false
    assumed_state: false
    on_closed:
      - globals.set:
          id: blind_position
          value: "0.0"
    on_open:
      - globals.set:
          id: blind_position
          value: "1.0"

# =============================================================================
# Buttons
# =============================================================================

button:
  - platform: template
    name: "${friendly_name} Calibrate"
    icon: "mdi:tape-measure"
    on_press:
      - logger.log: "Calibration: driving to closed endstop..."
      - cover.close: blinds_cover

  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

# =============================================================================
# Diagnostics
# =============================================================================

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
