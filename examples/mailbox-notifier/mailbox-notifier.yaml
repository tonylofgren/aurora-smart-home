# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Battery-powered mailbox door sensor.
# Wakes from deep sleep when the reed switch state changes,
# fires a Home Assistant notification, then goes back to sleep.
#
# Target battery life: 6+ months on a single 18650 (3.7V LiPo).

esphome:
  name: mailbox-notifier
  friendly_name: Mailbox Notifier
  comment: "Battery-powered mail arrival sensor"
  on_boot:
    priority: -100
    then:
      - logger.log: "Woke from deep sleep, reporting state then sleeping again"

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi - keep credentials in secrets.yaml
# Mailboxes are often at the edge of WiFi coverage.
# See README.md for antenna placement guidance.
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none  # Maximum signal strength during the short awake window
  fast_connect: true     # Skip scan, connect to last-known BSSID
  manual_ip:
    static_ip: !secret mailbox_static_ip
    gateway: !secret network_gateway
    subnet: !secret network_subnet
    dns1: !secret network_dns
  ap:
    ssid: "Mailbox Fallback AP"
    password: !secret fallback_ap_password

captive_portal:

logger:
  level: INFO
  baud_rate: 0  # Disable UART logging to save power

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s  # We sleep, not reboot - do not auto-reboot on disconnect

ota:
  - platform: esphome
    password: !secret ota_password

# Deep sleep configuration
# wakeup_pin: GPIO33 is RTC-capable on ESP32-WROOM-32.
# wakeup_pin_mode: INVERT_WAKEUP flips the trigger so the device sleeps
# again after handling the wake event, ready for the next state change.
deep_sleep:
  id: deep_sleep_control
  wakeup_pin:
    number: GPIO33
    mode: INPUT_PULLUP
    inverted: true
  wakeup_pin_mode: INVERT_WAKEUP
  # No run_duration / sleep_duration set on purpose:
  # We only wake on the reed switch event, not on a timer.
  # run_duration is managed by the script below (we sleep when work is done).

# Reed switch on the mailbox lid.
# Wired between GPIO33 and GND. Pull-up keeps GPIO33 HIGH when lid closed
# (magnet near reed = circuit closed = LOW = wake).
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Mailbox Lid"
    device_class: opening
    id: mailbox_lid
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

# Battery voltage monitoring.
# 18650 LiPo through a 100k / 100k divider into GPIO34 (ADC1_CH6).
# 4.20V (full) -> 2.10V at ADC. 3.00V (empty) -> 1.50V at ADC.
# Below 3.30V we send a warning, below 3.00V the protection circuit cuts off.
sensor:
  - platform: adc
    pin: GPIO34
    name: "Mailbox Battery Voltage"
    id: battery_voltage
    update_interval: never  # Read once on boot, see script below
    attenuation: 12db
    accuracy_decimals: 2
    filters:
      - multiply: 2.0  # Compensate for the 1:1 divider
    unit_of_measurement: "V"
    device_class: voltage

  - platform: wifi_signal
    name: "Mailbox WiFi Signal"
    update_interval: never
    id: wifi_rssi

# Notify HA, read battery, then sleep.
# We give the API ~10 seconds to deliver the state change before sleeping.
script:
  - id: report_and_sleep
    then:
      - wait_until:
          condition:
            api.connected:
          timeout: 15s
      - component.update: battery_voltage
      - component.update: wifi_rssi
      - delay: 2s
      - logger.log: "Report done, entering deep sleep"
      - deep_sleep.enter: deep_sleep_control

# Kick off the report-and-sleep cycle once everything is up.
interval:
  - interval: 1s
    startup_delay: 3s
    then:
      - script.execute: report_and_sleep
