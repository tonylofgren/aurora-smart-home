#
# Lovelace dashboard view for the Mailbox Notifier.
# Add as a view in your dashboard YAML or paste cards into the UI editor.

title: Mailbox
path: mailbox
icon: mdi:mailbox
cards:
  - type: vertical-stack
    cards:
      - type: markdown
        content: |
          ## Mailbox Status
          Battery-powered mail arrival sensor.
          Wakes only when the lid opens.

      - type: glance
        title: At a glance
        entities:
          - entity: binary_sensor.mailbox_lid
            name: Lid
          - entity: sensor.mailbox_battery_voltage
            name: Battery
          - entity: sensor.mailbox_wifi_signal
            name: WiFi
          - entity: input_datetime.last_mail_arrival
            name: Last mail

      - type: gauge
        entity: sensor.mailbox_battery_voltage
        name: Battery voltage
        min: 3.0
        max: 4.2
        severity:
          green: 3.6
          yellow: 3.3
          red: 3.0
        needle: true

      - type: history-graph
        title: Mail events (last 30 days)
        hours_to_show: 720
        entities:
          - entity: binary_sensor.mailbox_lid

      - type: history-graph
        title: Battery trend
        hours_to_show: 720
        entities:
          - entity: sensor.mailbox_battery_voltage
