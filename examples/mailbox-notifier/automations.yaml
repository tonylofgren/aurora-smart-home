#
# Home Assistant automations for the Mailbox Notifier.
# Copy into your automations.yaml or import via the UI.

- id: mailbox_mail_arrived
  alias: "Mailbox: Mail arrived"
  description: "Send a notification when the mailbox lid is opened."
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.mailbox_lid
      to: "on"
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "You have mail"
        message: "The mailbox was just opened."
        data:
          tag: mailbox
          channel: Mailbox
          importance: high
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.last_mail_arrival
      data:
        datetime: "{{ now().isoformat() }}"

- id: mailbox_battery_low
  alias: "Mailbox: Battery low warning"
  description: "Warn when battery drops below 3.30V (about 15% remaining)."
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.mailbox_battery_voltage
      below: 3.30
      for: "00:01:00"
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "Mailbox battery low"
        message: >-
          Mailbox battery is at
          {{ states('sensor.mailbox_battery_voltage') }}V.
          Recharge or swap the 18650 within the next week.

- id: mailbox_battery_critical
  alias: "Mailbox: Battery critical"
  description: "Critical warning when battery drops below 3.10V."
  mode: single
  trigger:
    - platform: numeric_state
      entity_id: sensor.mailbox_battery_voltage
      below: 3.10
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "Mailbox battery CRITICAL"
        message: >-
          Battery at {{ states('sensor.mailbox_battery_voltage') }}V.
          Replace immediately or the device will shut off.
        data:
          tag: mailbox-critical
          importance: max

- id: mailbox_offline_check
  alias: "Mailbox: Long silence check"
  description: >-
    Warn if no mail event has been registered in 14 days.
    Could be normal, but could also mean the device died.
  mode: single
  trigger:
    - platform: template
      value_template: >-
        {{ (now() - states.input_datetime.last_mail_arrival.last_changed)
           .total_seconds() > 14 * 86400 }}
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "Mailbox unusually quiet"
        message: >-
          No mailbox activity in 14 days. Check the device
          (battery, WiFi, or the postal service is taking a break).
