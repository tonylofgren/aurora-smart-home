# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Smart Plug with Power Monitoring
# Replaces Athom/Shelly/Sonoff S31 firmware with open ESPHome.
#
# Hardware:
#   - ESP32-C3 (or ESP8266 on older Sonoff S31 / Athom)
#   - BL0942 power-monitor IC (UART)
#   - Single relay (mains switching)
#   - Status LED tied to relay state
#   - Physical button for local toggle
#
# Mains wiring is dangerous. Buy a pre-built Athom or Sonoff plug
# and reflash it. Do not wire bare ESP boards into 230 V unless you
# are a qualified electrician.

substitutions:
  device_name: "smart-plug"
  friendly_name: "Smart Plug"

  # Pin map for Athom Plug V3 (ESP32-C3 + BL0942).
  # Change these for Sonoff S31, Shelly Plug S, etc.
  relay_pin: "GPIO5"
  led_pin: "GPIO3"
  button_pin: "GPIO9"
  bl0942_rx_pin: "GPIO20"
  bl0942_tx_pin: "GPIO21"

  # BL0942 calibration (factory default for Athom V3).
  # Re-calibrate if you see drift greater than +-5 %.
  current_ref: "251210"
  voltage_ref: "15397"
  power_ref: "598"
  energy_ref: "3304"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      # Restore previous relay state after a power glitch.
      - light.turn_on:
          id: status_led
          brightness: 100%

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  baud_rate: 0   # Free up UART0 for BL0942

# =============================================================================
# Power Monitor (BL0942 over UART)
# =============================================================================

uart:
  rx_pin: ${bl0942_rx_pin}
  tx_pin: ${bl0942_tx_pin}
  baud_rate: 4800
  stop_bits: 1

sensor:
  - platform: bl0942
    update_interval: 5s
    current:
      name: "${friendly_name} Current"
      id: plug_current
      accuracy_decimals: 3
      filters:
        - lambda: if (x < 0.02) return 0.0; else return x;
    voltage:
      name: "${friendly_name} Voltage"
      id: plug_voltage
      accuracy_decimals: 1
    power:
      name: "${friendly_name} Power"
      id: plug_power
      accuracy_decimals: 2
      filters:
        - lambda: if (x < 0.5) return 0.0; else return x;
    energy:
      name: "${friendly_name} Energy Session"
      id: plug_energy_session
      accuracy_decimals: 3

  # Accumulated total energy (restored across reboots)
  - platform: total_daily_energy
    name: "${friendly_name} Energy Today"
    power_id: plug_power
    accuracy_decimals: 3
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.001   # Wh -> kWh

  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

# =============================================================================
# Relay (mains switch)
# =============================================================================

switch:
  - platform: gpio
    pin: ${relay_pin}
    name: "${friendly_name}"
    id: relay
    icon: "mdi:power-socket-eu"
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - light.turn_on: status_led
    on_turn_off:
      - light.turn_off: status_led

# =============================================================================
# Status LED (mirrors relay)
# =============================================================================

output:
  - platform: gpio
    pin:
      number: ${led_pin}
      inverted: true
    id: led_output

light:
  - platform: binary
    id: status_led
    name: "${friendly_name} LED"
    output: led_output
    entity_category: config
    internal: false

# =============================================================================
# Physical Button (local toggle)
# =============================================================================

binary_sensor:
  - platform: gpio
    pin:
      number: ${button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Button"
    id: button
    on_press:
      - switch.toggle: relay
    on_multi_click:
      # Hold 5 s to factory-reset wifi credentials.
      - timing:
          - ON for at least 5s
        then:
          - logger.log: "Long press - clearing wifi"
          - wifi.disable:

# =============================================================================
# Diagnostic
# =============================================================================

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"
      entity_category: diagnostic

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config
