#
# DEEP-mode demo: this is the artifact Sage recorded in aurora-project.json
# (ha_yaml_files: packages/co2_monitor.yaml), built on the entity IDs Volt
# generated (sensor.co2_monitor_co2 and friends).

automation:
  - alias: "CO2 - Stuffy air warning"
    id: co2_monitor_stuffy_warning
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.co2_monitor_co2
        above: 1000
        for:
          minutes: 5
    conditions:
      - condition: state
        entity_id: binary_sensor.anyone_home
        state: "on"
    actions:
      - action: notify.mobile_app_phone
        data:
          title: "Air getting stuffy"
          message: >
            CO2 in the office is {{ states('sensor.co2_monitor_co2') }} ppm.
            Time to open a window.

  - alias: "CO2 - Cleared"
    id: co2_monitor_cleared
    mode: single
    triggers:
      - trigger: numeric_state
        entity_id: sensor.co2_monitor_co2
        below: 800
        for:
          minutes: 5
    actions:
      - action: notify.mobile_app_phone
        data:
          message: "CO2 back to normal."
