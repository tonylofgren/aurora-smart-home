# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# DEEP-mode demo: this is the artifact Volt recorded in aurora-project.json
# (selected_board esp32-c3-mini, component scd40, gpio sda 6 / scl 7).

substitutions:
  name: co2-monitor
  friendly_name: CO2 Monitor

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

sensor:
  - platform: scd4x
    co2:
      name: "CO2"
      id: co2_value
    temperature:
      name: "Temperature"
    humidity:
      name: "Humidity"
    address: 0x62
    update_interval: 30s
