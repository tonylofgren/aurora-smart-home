# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# LED Strip Lovelace Dashboard
# Uses Mushroom cards (HACS: lovelace-mushroom)
# Import via: Settings > Dashboards > Add Dashboard > Edit > Raw config

title: LED Strip
views:
  - title: Strip
    path: led-strip
    icon: mdi:led-strip-variant
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              # LED Strip Control

          # Primary light tile with brightness slider
          - type: custom:mushroom-light-card
            entity: light.led_strip
            name: LED Strip
            icon: mdi:led-strip-variant
            use_light_color: true
            show_brightness_control: true
            show_color_control: true
            show_color_temp_control: false
            collapsible_controls: true
            tap_action:
              action: toggle
            hold_action:
              action: more-info

          # Quick color presets
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Warm
                icon: mdi:weather-sunset
                icon_color: orange
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    rgb_color: [255, 140, 60]
                    brightness: 200
                    effect: "None"

              - type: custom:mushroom-template-card
                primary: Cool
                icon: mdi:snowflake
                icon_color: light-blue
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    rgb_color: [180, 220, 255]
                    brightness: 220
                    effect: "None"

              - type: custom:mushroom-template-card
                primary: Red
                icon: mdi:heart
                icon_color: red
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    rgb_color: [255, 0, 40]
                    brightness: 200
                    effect: "None"

          # Effect chips
          - type: custom:mushroom-chips-card
            chips:
              - type: template
                content: Rainbow
                icon: mdi:looks
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    effect: "Rainbow"
              - type: template
                content: Twinkle
                icon: mdi:star-four-points
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    effect: "Twinkle"
              - type: template
                content: Scan
                icon: mdi:radar
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    effect: "Scan"
              - type: template
                content: Fireworks
                icon: mdi:firework
                tap_action:
                  action: perform-action
                  perform_action: light.turn_on
                  target:
                    entity_id: light.led_strip
                  data:
                    effect: "Fireworks"

          # Diagnostics
          - type: entities
            title: Device Info
            entities:
              - entity: sensor.led_strip_wifi
                name: WiFi Signal
              - entity: sensor.led_strip_uptime
                name: Uptime
              - entity: button.led_strip_identify
                name: Identify
              - entity: button.led_strip_restart
                name: Restart Device
