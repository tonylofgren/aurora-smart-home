# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# LED Strip Controller
# Addressable WS2812B (or SK6812 RGBW) strip with effects, color picker
# integration, brightness control, and boot animation.
#
# Hardware:
#   - ESP32 DevKit (or ESP32-C3 Mini)
#   - WS2812B addressable LED strip (60 LEDs default)
#   - 5V power supply (>= 4 A for 60 LEDs at full white)
#   - 74AHCT125 or 74HCT245 level shifter (recommended for reliable data)
#   - 470 ohm series resistor on data line
#   - 1000 uF capacitor across 5V/GND near the strip

substitutions:
  device_name: "led-strip"
  friendly_name: "LED Strip"

  # Strip configuration
  num_leds: "60"
  data_pin: "GPIO13"

  # Strip type. For WS2812B use GRB. For SK6812 RGBW swap variant below.
  rgb_order: "GRB"

  # Default boot brightness (0-255)
  default_brightness: "180"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      # Short boot animation: green wipe so you know the controller is alive
      - light.turn_on:
          id: led_strip
          brightness: 80%
          effect: "Boot Wipe"
      - delay: 4s
      - light.turn_off:
          id: led_strip

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# =============================================================================
# Power Supply Monitor (optional analog read)
# =============================================================================

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "${friendly_name} Uptime"
    entity_category: diagnostic

# =============================================================================
# LED Strip Light
# =============================================================================
# neopixelbus is preferred over fastled for ESP32 because it uses RMT/I2S
# and does not disable interrupts during a frame write.

light:
  - platform: neopixelbus
    type: ${rgb_order}
    variant: WS2812
    pin: ${data_pin}
    num_leds: ${num_leds}
    name: "${friendly_name}"
    id: led_strip
    restore_mode: RESTORE_DEFAULT_OFF
    default_transition_length: 500ms
    effects:
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 50
      - addressable_color_wipe:
          name: "Color Wipe"
          colors:
            - red: 100%
              green: 100%
              blue: 100%
              num_leds: 1
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 1
          add_led_interval: 100ms
          reverse: false
      - addressable_color_wipe:
          name: "Boot Wipe"
          colors:
            - red: 0%
              green: 100%
              blue: 0%
              num_leds: 1
            - red: 0%
              green: 0%
              blue: 0%
              num_leds: 1
          add_led_interval: 30ms
          reverse: false
      - addressable_scan:
          name: "Scan"
          move_interval: 80ms
          scan_width: 1
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval: 4ms
      - addressable_random_twinkle:
          name: "Random Twinkle"
          twinkle_probability: 5%
          progress_interval: 32ms
      - addressable_fireworks:
          name: "Fireworks"
          update_interval: 32ms
          spark_probability: 10%
          use_random_color: true
          fade_out_rate: 120
      - pulse:
          name: "Pulse Slow"
          transition_length: 2s
          update_interval: 2s
      - strobe:
          name: "Strobe"
          colors:
            - state: true
              brightness: 100%
              duration: 100ms
            - state: false
              duration: 100ms

# =============================================================================
# Buttons
# =============================================================================

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

  - platform: template
    name: "${friendly_name} Identify"
    icon: "mdi:lightbulb-on"
    on_press:
      - light.turn_on:
          id: led_strip
          red: 1.0
          green: 1.0
          blue: 1.0
          brightness: 100%
      - delay: 1s
      - light.turn_off:
          id: led_strip

# =============================================================================
# Text Sensors
# =============================================================================

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"
      entity_category: diagnostic
