# LED Strip Automations for Home Assistant
# Add to your automations.yaml or import via UI

# =============================================================================
# Sunset Warm Glow
# =============================================================================

- alias: "LED Strip - Sunset Warm Glow"
  id: led_strip_sunset
  description: "Fade strip to warm color at sunset"
  trigger:
    - platform: sun
      event: sunset
      offset: "-00:15:00"
  action:
    - service: light.turn_on
      target:
        entity_id: light.led_strip
      data:
        rgb_color: [255, 140, 60]
        brightness: 200
        transition: 300

# =============================================================================
# Bedtime Fade Out
# =============================================================================

- alias: "LED Strip - Bedtime Fade Out"
  id: led_strip_bedtime
  description: "Gradually dim strip before bed"
  trigger:
    - platform: time
      at: "23:00:00"
  action:
    - service: light.turn_on
      target:
        entity_id: light.led_strip
      data:
        brightness: 20
        transition: 600
    - delay:
        minutes: 10
    - service: light.turn_off
      target:
        entity_id: light.led_strip
      data:
        transition: 60

# =============================================================================
# Motion Activated Color Wipe
# =============================================================================

- alias: "LED Strip - Motion Welcome"
  id: led_strip_motion_welcome
  description: "Play color wipe effect on motion in hallway"
  trigger:
    - platform: state
      entity_id: binary_sensor.hallway_motion
      to: "on"
  condition:
    - condition: sun
      after: sunset
      before: sunrise
  action:
    - service: light.turn_on
      target:
        entity_id: light.led_strip
      data:
        effect: "Color Wipe"
        brightness: 180

# =============================================================================
# Doorbell Strobe Alert
# =============================================================================

- alias: "LED Strip - Doorbell Strobe"
  id: led_strip_doorbell_strobe
  description: "Strobe effect when doorbell rings"
  trigger:
    - platform: state
      entity_id: binary_sensor.doorbell
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.led_strip
      data:
        effect: "Strobe"
    - delay:
        seconds: 5
    - service: light.turn_off
      target:
        entity_id: light.led_strip

# =============================================================================
# Party Mode Rainbow
# =============================================================================

- alias: "LED Strip - Party Mode On"
  id: led_strip_party_on
  description: "Switch to rainbow effect via input boolean"
  trigger:
    - platform: state
      entity_id: input_boolean.party_mode
      to: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.led_strip
      data:
        effect: "Rainbow"
        brightness: 255

- alias: "LED Strip - Party Mode Off"
  id: led_strip_party_off
  description: "Restore static color when party mode disabled"
  trigger:
    - platform: state
      entity_id: input_boolean.party_mode
      to: "off"
  action:
    - service: light.turn_on
      target:
        entity_id: light.led_strip
      data:
        rgb_color: [255, 200, 120]
        brightness: 160
        effect: "None"
