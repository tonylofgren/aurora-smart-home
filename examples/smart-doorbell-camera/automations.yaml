# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Doorbell automations for Home Assistant.
# Copy into automations.yaml or import via the UI.

# =============================================================================
# Doorbell Pressed - Snapshot + Push
# =============================================================================

- alias: "Doorbell - Press with snapshot"
  id: doorbell_pressed_snapshot
  description: "Capture a snapshot and push it to mobile devices"
  mode: queued
  max: 3
  triggers:
    - trigger: event
      event_type: esphome.doorbell_pressed
  actions:
    - action: camera.snapshot
      target:
        entity_id: camera.front_door_bell_camera
      data:
        filename: "/config/www/doorbell/last_ring.jpg"
    - action: notify.mobile_app_phone
      data:
        title: "Someone at the door"
        message: "Front door bell pressed at {{ now().strftime('%H:%M') }}"
        data:
          image: "/local/doorbell/last_ring.jpg"
          tag: doorbell
          ttl: 0
          priority: high

# =============================================================================
# Doorbell Pressed - TTS Indoors (optional)
# =============================================================================

- alias: "Doorbell - Announce on speakers"
  id: doorbell_announce
  description: "Speak announcement on indoor media players"
  mode: single
  triggers:
    - trigger: event
      event_type: esphome.doorbell_pressed
  conditions:
    - condition: time
      after: "08:00:00"
      before: "21:30:00"
  actions:
    - action: tts.cloud_say
      data:
        entity_id: media_player.living_room
        message: "Someone is at the front door."

# =============================================================================
# Rate Limit (avoid spam from button mashing)
# =============================================================================

- alias: "Doorbell - Cooldown lock"
  id: doorbell_cooldown
  description: "Disable retrigger for 15 seconds after a press"
  mode: single
  triggers:
    - trigger: event
      event_type: esphome.doorbell_pressed
  actions:
    - action: automation.turn_off
      target:
        entity_id: automation.doorbell_pressed_snapshot
      data:
        stop_actions: false
    - delay:
        seconds: 15
    - action: automation.turn_on
      target:
        entity_id: automation.doorbell_pressed_snapshot
