# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Smart Doorbell Camera
# ESP32-CAM (AI-Thinker) with OV2640 sensor, tactile push button,
# optional chime relay for retrofit of mechanical doorbells, and IR LED
# for low-light captures. Triggers a Home Assistant notification with
# a fresh snapshot on every press.

substitutions:
  device_name: "doorbell"
  friendly_name: "Front Door Bell"

  # Pin assignment (AI-Thinker ESP32-CAM)
  # GPIO0/GPIO2 are strapping pins, avoid for inputs.
  # GPIO4 drives the on-board flash LED.
  button_pin: "GPIO12"
  chime_relay_pin: "GPIO13"
  flash_led_pin: "GPIO4"

  # Snapshot resolution: balanced detail vs upload speed
  camera_resolution: "1024X768"

  # Chime pulse length (mimics doorbell button press)
  chime_pulse_ms: "500ms"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32cam
  framework:
    type: arduino

# Reduce brownout false-trips on cheap PSUs by lowering CPU clock
# headroom and trusting the on-board regulator. See README for PSU
# notes - a 5V/2A supply with thick wires is required.
preferences:
  flash_write_interval: 5min

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
    ssid: "${device_name}-fallback"

logger:
  level: INFO
  # UART0 shares pins with the camera on some clones - keep quiet.
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key
  actions:
    - action: take_snapshot
      then:
        - logger.log: "Snapshot requested from HA"

ota:
  - platform: esphome
    password: !secret ota_password

# =============================================================================
# Camera (OV2640 on AI-Thinker ESP32-CAM)
# =============================================================================

esp32_camera:
  name: "${friendly_name} Camera"
  id: doorbell_cam
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: ${camera_resolution}
  jpeg_quality: 10
  max_framerate: 5 fps
  idle_framerate: 0.2 fps
  vertical_flip: false
  horizontal_mirror: false

# Live MJPEG preview at http://<device-ip>:8080
esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

# =============================================================================
# Button
# =============================================================================

binary_sensor:
  - platform: gpio
    pin:
      number: ${button_pin}
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Button"
    id: doorbell_button
    device_class: occupancy
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      then:
        # Acknowledge press locally
        - switch.turn_on: flash_led
        - delay: 120ms
        - switch.turn_off: flash_led
        # Pulse the mechanical chime (no-op if relay not wired)
        - switch.turn_on: chime_relay
        - delay: ${chime_pulse_ms}
        - switch.turn_off: chime_relay
        # Notify HA - automation handles snapshot + push
        - homeassistant.event:
            event: esphome.doorbell_pressed
            data:
              device: ${device_name}

  - platform: status
    name: "${friendly_name} Status"

# =============================================================================
# Outputs
# =============================================================================

switch:
  - platform: gpio
    pin: ${chime_relay_pin}
    name: "${friendly_name} Chime"
    id: chime_relay
    restore_mode: ALWAYS_OFF
    icon: "mdi:bell-ring"

  - platform: gpio
    pin: ${flash_led_pin}
    name: "${friendly_name} Flash"
    id: flash_led
    restore_mode: ALWAYS_OFF
    icon: "mdi:flashlight"

# =============================================================================
# Diagnostics
# =============================================================================

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: "${friendly_name} Chip Temperature"
    update_interval: 60s
    entity_category: diagnostic

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

  - platform: template
    name: "${friendly_name} Test Ring"
    icon: "mdi:bell-alert"
    on_press:
      - homeassistant.event:
          event: esphome.doorbell_pressed
          data:
            device: ${device_name}

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
