#
# Lovelace dashboard for the Smart Doorbell Camera.

title: Doorbell
views:
  - title: Front Door
    path: doorbell
    icon: mdi:doorbell-video
    cards:
      - type: picture-entity
        entity: camera.front_door_bell_camera
        camera_view: live
        show_state: false
        show_name: false
        tap_action:
          action: more-info

      - type: horizontal-stack
        cards:
          - type: button
            entity: switch.front_door_bell_chime
            name: Test Chime
            icon: mdi:bell-ring
            tap_action:
              action: toggle
          - type: button
            entity: button.front_door_bell_test_ring
            name: Test Ring
            icon: mdi:bell-alert
            tap_action:
              action: press
          - type: button
            entity: switch.front_door_bell_flash
            name: IR Flash
            icon: mdi:flashlight
            tap_action:
              action: toggle

      - type: entities
        title: Status
        entities:
          - entity: binary_sensor.front_door_bell_button
            name: Button
          - entity: binary_sensor.front_door_bell_status
            name: Device Online
          - entity: sensor.front_door_bell_wifi
            name: WiFi Signal
          - entity: sensor.front_door_bell_chip_temperature
            name: Chip Temperature
          - entity: button.front_door_bell_restart
            name: Restart Device

      - type: logbook
        title: Recent Rings
        entities:
          - binary_sensor.front_door_bell_button
        hours_to_show: 48
