# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Pool / spa controller for residential swimming pools.
# Monitors water temperature, pH and ORP (chlorine proxy), and drives
# the main circulation pump plus two peristaltic dosing pumps for
# chlorine (hypochlorite) and pH minus (sulfuric or muriatic acid).
#
# Hardware:
#   - ESP32 dev board (any 30-pin module with 4 MB flash)
#   - DS18B20 waterproof temperature probe in a brass thermowell
#   - Atlas Scientific EZO-pH circuit (I2C mode, address 0x63)
#   - Atlas Scientific EZO-ORP circuit (I2C mode, address 0x62)
#   - 2-channel SSR or relay board for main pump (230 V AC)
#   - 2-channel low-side MOSFET / relay board for 12 V dosing pumps
#
# Wiring:
#   GPIO21 -> I2C SDA (EZO pH + EZO ORP, daisy-chained)
#   GPIO22 -> I2C SCL
#   GPIO4  -> DS18B20 data (4.7 kOhm pull-up to 3V3)
#   GPIO25 -> Main pump relay (active-high SSR)
#   GPIO26 -> Chlorine dosing pump (active-high)
#   GPIO27 -> pH minus dosing pump (active-high)
#   GPIO32 -> Flow switch input (active-low, INPUT_PULLUP)

esphome:
  name: pool-controller
  friendly_name: Pool Controller
  comment: "ESP32 pool/spa controller with pH and ORP dosing"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Pool-Controller Fallback"
    password: !secret fallback_ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Stockholm"

# I2C bus for Atlas Scientific EZO circuits
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 100kHz

# One-Wire bus for the DS18B20 temperature probe
one_wire:
  - platform: gpio
    pin: GPIO4

sensor:
  # Water temperature in the main return line
  - platform: dallas_temp
    name: "Pool Water Temperature"
    id: water_temp
    update_interval: 30s
    accuracy_decimals: 1
    filters:
      - filter_out: nan
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  # pH from Atlas Scientific EZO-pH circuit
  - platform: ezo
    id: ezo_ph
    address: 0x63
    unit_of_measurement: "pH"
    name: "Pool pH"
    accuracy_decimals: 2
    update_interval: 60s
    filters:
      - filter_out: nan
      - clamp:
          min_value: 0.0
          max_value: 14.0

  # ORP (oxidation-reduction potential) from Atlas Scientific EZO-ORP
  - platform: ezo
    id: ezo_orp
    address: 0x62
    unit_of_measurement: "mV"
    name: "Pool ORP"
    accuracy_decimals: 0
    update_interval: 60s
    filters:
      - filter_out: nan

  # WiFi signal strength for diagnostics
  - platform: wifi_signal
    name: "Pool Controller WiFi Signal"
    update_interval: 60s

  # Daily dosing counters (in millilitres) to enforce safety caps
  - platform: template
    name: "Chlorine Dosed Today"
    id: chlorine_dosed_today
    unit_of_measurement: "ml"
    accuracy_decimals: 1
    icon: mdi:beaker-outline
    update_interval: never

  - platform: template
    name: "pH Minus Dosed Today"
    id: ph_minus_dosed_today
    unit_of_measurement: "ml"
    accuracy_decimals: 1
    icon: mdi:beaker-outline
    update_interval: never

binary_sensor:
  # Flow switch on the return line. Dosing is blocked when no flow.
  - platform: gpio
    pin:
      number: GPIO32
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Pool Flow Detected"
    id: flow_detected
    device_class: moisture
    filters:
      - delayed_on: 2s
      - delayed_off: 5s

switch:
  # Main circulation pump (230 V AC via SSR)
  - platform: gpio
    pin: GPIO25
    name: "Pool Main Pump"
    id: main_pump
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:pump

  # Chlorine peristaltic dosing pump (12 V)
  - platform: gpio
    pin: GPIO26
    name: "Chlorine Dosing Pump"
    id: chlorine_pump
    restore_mode: ALWAYS_OFF
    icon: mdi:beaker-plus

  # pH minus peristaltic dosing pump (12 V)
  - platform: gpio
    pin: GPIO27
    name: "pH Minus Dosing Pump"
    id: ph_minus_pump
    restore_mode: ALWAYS_OFF
    icon: mdi:beaker-minus

number:
  # Operator-settable targets, surfaced as HA number entities
  - platform: template
    name: "pH Target Low"
    id: ph_target_low
    optimistic: true
    min_value: 6.8
    max_value: 7.4
    step: 0.05
    initial_value: 7.2
    restore_value: true
    unit_of_measurement: "pH"

  - platform: template
    name: "pH Target High"
    id: ph_target_high
    optimistic: true
    min_value: 7.4
    max_value: 8.0
    step: 0.05
    initial_value: 7.6
    restore_value: true
    unit_of_measurement: "pH"

  - platform: template
    name: "ORP Target Low"
    id: orp_target_low
    optimistic: true
    min_value: 550
    max_value: 700
    step: 10
    initial_value: 650
    restore_value: true
    unit_of_measurement: "mV"

  - platform: template
    name: "ORP Target High"
    id: orp_target_high
    optimistic: true
    min_value: 700
    max_value: 850
    step: 10
    initial_value: 750
    restore_value: true
    unit_of_measurement: "mV"

  - platform: template
    name: "Chlorine Daily Cap"
    id: chlorine_daily_cap
    optimistic: true
    min_value: 0
    max_value: 500
    step: 10
    initial_value: 200
    restore_value: true
    unit_of_measurement: "ml"

  - platform: template
    name: "pH Minus Daily Cap"
    id: ph_minus_daily_cap
    optimistic: true
    min_value: 0
    max_value: 200
    step: 5
    initial_value: 100
    restore_value: true
    unit_of_measurement: "ml"

  - platform: template
    name: "Peristaltic Pump Flow Rate"
    id: pump_flow_rate
    optimistic: true
    min_value: 0.5
    max_value: 5.0
    step: 0.1
    initial_value: 1.5
    restore_value: true
    unit_of_measurement: "ml/s"

select:
  - platform: template
    name: "Pool Operating Mode"
    id: pool_mode
    optimistic: true
    options:
      - "Summer"
      - "Winter"
      - "Service"
    initial_option: "Summer"
    restore_value: true

button:
  - platform: template
    name: "Reset Daily Dosing Counters"
    on_press:
      - sensor.template.publish:
          id: chlorine_dosed_today
          state: 0.0
      - sensor.template.publish:
          id: ph_minus_dosed_today
          state: 0.0

# Reset counters at midnight local time
interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: |-
              auto t = id(sntp_time).now();
              return t.is_valid() && t.hour == 0 && t.minute == 0;
          then:
            - sensor.template.publish:
                id: chlorine_dosed_today
                state: 0.0
            - sensor.template.publish:
                id: ph_minus_dosed_today
                state: 0.0

# Scripts called from Home Assistant automations to issue safe dosing pulses
script:
  - id: dose_chlorine
    parameters:
      volume_ml: float
    then:
      - if:
          condition:
            and:
              - binary_sensor.is_on: flow_detected
              - switch.is_on: main_pump
              - lambda: |-
                  return (id(chlorine_dosed_today).state + volume_ml)
                    <= id(chlorine_daily_cap).state;
          then:
            - switch.turn_on: chlorine_pump
            - delay: !lambda "return (volume_ml / id(pump_flow_rate).state) * 1000;"
            - switch.turn_off: chlorine_pump
            - sensor.template.publish:
                id: chlorine_dosed_today
                state: !lambda "return id(chlorine_dosed_today).state + volume_ml;"

  - id: dose_ph_minus
    parameters:
      volume_ml: float
    then:
      - if:
          condition:
            and:
              - binary_sensor.is_on: flow_detected
              - switch.is_on: main_pump
              - lambda: |-
                  return (id(ph_minus_dosed_today).state + volume_ml)
                    <= id(ph_minus_daily_cap).state;
          then:
            - switch.turn_on: ph_minus_pump
            - delay: !lambda "return (volume_ml / id(pump_flow_rate).state) * 1000;"
            - switch.turn_off: ph_minus_pump
            - sensor.template.publish:
                id: ph_minus_dosed_today
                state: !lambda "return id(ph_minus_dosed_today).state + volume_ml;"

# Expose the dosing scripts as HA-callable services
api:
  actions:
    - action: dose_chlorine_ml
      variables:
        ml: float
      then:
        - script.execute:
            id: dose_chlorine
            volume_ml: !lambda "return ml;"
    - action: dose_ph_minus_ml
      variables:
        ml: float
      then:
        - script.execute:
            id: dose_ph_minus
            volume_ml: !lambda "return ml;"
    - action: calibrate_ph
      variables:
        point: string
      then:
        - lambda: |-
            id(ezo_ph).set_calibration_point_command(point, 0);
    - action: calibrate_orp
      variables:
        mv: float
      then:
        - lambda: |-
            id(ezo_orp).set_calibration_point_command("any", mv);
