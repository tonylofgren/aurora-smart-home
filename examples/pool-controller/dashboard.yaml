#
# Lovelace dashboard view for the pool controller. Paste this under
# a new view in your dashboard YAML, or use it as a standalone view.

title: Pool
path: pool
icon: mdi:pool
cards:
  - type: vertical-stack
    cards:
      - type: glance
        title: Water chemistry
        columns: 3
        entities:
          - entity: sensor.pool_water_temperature
            name: Temp
          - entity: sensor.pool_ph
            name: pH
          - entity: sensor.pool_orp
            name: ORP

      - type: entities
        title: Pumps and flow
        entities:
          - entity: switch.pool_main_pump
            name: Main pump
          - entity: binary_sensor.pool_flow_detected
            name: Flow detected
          - entity: switch.chlorine_dosing_pump
            name: Chlorine pump
          - entity: switch.ph_minus_dosing_pump
            name: pH minus pump

      - type: entities
        title: Targets and limits
        entities:
          - entity: number.ph_target_low
          - entity: number.ph_target_high
          - entity: number.orp_target_low
          - entity: number.orp_target_high
          - entity: number.chlorine_daily_cap
          - entity: number.ph_minus_daily_cap
          - entity: number.peristaltic_pump_flow_rate

      - type: entities
        title: Today
        entities:
          - entity: sensor.chlorine_dosed_today
          - entity: sensor.ph_minus_dosed_today
          - entity: select.pool_operating_mode
          - entity: button.reset_daily_dosing_counters

  - type: history-graph
    title: Trends (24 h)
    hours_to_show: 24
    entities:
      - entity: sensor.pool_water_temperature
      - entity: sensor.pool_ph
      - entity: sensor.pool_orp
