# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Panasonic heat pump (AC) controller via the CN-CNT service connector.
# Uses the panasonic_ac component (vendored from DomiStyle/esphome-panasonic-ac, MIT).
#
# SAFETY: a bi-directional 5V <-> 3.3V level shifter is mandatory between
# the ESP32 and the AC main board. Direct wiring damages the AC.

substitutions:
  devicename: "panasonic-ac"
  long_devicename: "Panasonic AC"
  ac_type: "cnt"          # 'cnt' for CZ-TACG1 (CN-CNT port). 'wlan' for DNSK-P11 (CN-WLAN port).

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "Panasonic heat pump via CN-CNT"

esp32:
  board: esp32dev
  framework:
    type: esp-idf         # required by panasonic_ac

# Load the panasonic_ac component.
#
# DEFAULT: load from a local components/ folder.
# Copy the Aurora-vendored directory (esphome/components/panasonic_ac/ from
# the Aurora repo) into a 'components/' folder next to this YAML.
external_components:
  - source:
      type: local
      path: components
    components: [panasonic_ac]

# ALTERNATIVE: fetch from upstream GitHub at compile time (needs internet).
# Comment out the block above and uncomment the block below if you prefer this.
#
# external_components:
#   - source: github://DomiStyle/esphome-panasonic-ac
#     components: [panasonic_ac]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO            # raise to DEBUG only while troubleshooting

uart:
  id: ac_uart
  tx_pin: GPIO17         # ESP32 UART2 TX, through level shifter to AC RX
  rx_pin: GPIO16         # ESP32 UART2 RX, through level shifter from AC TX
  baud_rate: 9600
  parity: EVEN

climate:
  - platform: panasonic_ac
    type: ${ac_type}
    name: "${long_devicename}"

    # Always-on entities (work on both CNT and WLAN variants)
    vertical_swing_select:
      name: "${long_devicename} vertical swing"
    horizontal_swing_select:
      name: "${long_devicename} horizontal swing"
    outside_temperature:
      name: "${long_devicename} outside temperature"
    econavi_switch:
      name: "${long_devicename} Econavi"
    current_power_consumption:
      name: "${long_devicename} estimated power"

    # Optional: NanoeX air purification (uncomment if your AC has it)
    # nanoex_switch:
    #   name: "${long_devicename} NanoeX"

    # CNT-only features. DO NOT uncomment these on a WLAN unit.
    # eco_switch:
    #   name: "${long_devicename} Eco mode"
    # mild_dry_switch:
    #   name: "${long_devicename} Mild Dry"

    # Optional offsets if your sensors disagree with reality
    # current_temperature_offset: -0.5
    # outside_temperature_offset: 0

# Status LED on the common ESP32 dev board built-in LED
light:
  - platform: binary
    id: status_led
    name: "${long_devicename} status LED"
    output: status_led_output

output:
  - id: status_led_output
    platform: gpio
    pin: GPIO2           # built-in LED on most ESP32 dev boards

switch:
  - platform: restart
    name: "${long_devicename} restart"

sensor:
  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s
