# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Smart Thermostat Relay Automations
# Add these to your automations.yaml or import via the UI.

# =============================================================================
# Night Setback (eco at bedtime)
# =============================================================================

- alias: "Thermostat - Night Setback"
  id: thermostat_night_setback
  description: "Switch to eco preset at night"
  trigger:
    - platform: time
      at: "23:00:00"
  action:
    - service: climate.set_preset_mode
      target:
        entity_id: climate.thermostat_climate
      data:
        preset_mode: Eco

# =============================================================================
# Morning Warm-Up
# =============================================================================

- alias: "Thermostat - Morning Comfort"
  id: thermostat_morning_comfort
  description: "Pre-heat to comfort temperature before wake-up"
  trigger:
    - platform: time
      at: "06:30:00"
  action:
    - service: climate.set_preset_mode
      target:
        entity_id: climate.thermostat_climate
      data:
        preset_mode: Comfort

# =============================================================================
# Away on Departure
# =============================================================================

- alias: "Thermostat - Away on Departure"
  id: thermostat_away_on_departure
  description: "Drop to Away preset when everyone leaves home"
  trigger:
    - platform: state
      entity_id: group.family
      to: "not_home"
      for:
        minutes: 30
  action:
    - service: climate.set_preset_mode
      target:
        entity_id: climate.thermostat_climate
      data:
        preset_mode: Away

# =============================================================================
# Window Open - Pause Heating
# =============================================================================

- alias: "Thermostat - Pause on Open Window"
  id: thermostat_pause_window
  description: "Turn off heating if a window is opened"
  trigger:
    - platform: state
      entity_id: binary_sensor.living_room_window
      to: "on"
      for:
        minutes: 2
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id: climate.thermostat_climate
      data:
        hvac_mode: "off"
    - service: notify.notify
      data:
        title: "Thermostat"
        message: "Window open - heating paused."

- alias: "Thermostat - Resume on Closed Window"
  id: thermostat_resume_window
  description: "Resume heating when window closes"
  trigger:
    - platform: state
      entity_id: binary_sensor.living_room_window
      to: "off"
      for:
        minutes: 1
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id: climate.thermostat_climate
      data:
        hvac_mode: heat

# =============================================================================
# Safety - Runaway Temperature Alert
# =============================================================================

- alias: "Thermostat - Runaway Temperature Alert"
  id: thermostat_runaway_alert
  description: "Alert if room temperature exceeds safety cutoff"
  trigger:
    - platform: numeric_state
      entity_id: sensor.thermostat_room_temperature
      above: 27
  action:
    - service: notify.notify
      data:
        title: "Thermostat Safety"
        message: >
          Room temperature is {{ states('sensor.thermostat_room_temperature') }} C.
          ESPHome safety cutoff triggers at 28 C.
