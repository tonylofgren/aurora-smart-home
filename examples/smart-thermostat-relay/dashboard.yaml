#
# Smart Thermostat Relay Lovelace Dashboard
# Import via: Settings > Dashboards > Add Dashboard > Import

title: Thermostat
views:
  - title: Heating
    path: thermostat
    icon: mdi:thermostat
    cards:
      - type: thermostat
        entity: climate.thermostat_climate
        name: Room Thermostat

      - type: horizontal-stack
        cards:
          - type: button
            name: Comfort
            icon: mdi:sofa
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.thermostat_comfort_preset

          - type: button
            name: Eco
            icon: mdi:leaf
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.thermostat_eco_preset

      - type: entities
        title: Status
        entities:
          - entity: sensor.thermostat_room_temperature
            name: Room Temperature
          - entity: switch.thermostat_boiler_relay
            name: Boiler Relay (manual override)
          - entity: binary_sensor.thermostat_status
            name: Device Online
          - entity: sensor.thermostat_wifi
            name: WiFi Signal
          - entity: button.thermostat_restart
            name: Restart Device

      - type: history-graph
        title: Room Temperature (24h)
        hours_to_show: 24
        entities:
          - sensor.thermostat_room_temperature
