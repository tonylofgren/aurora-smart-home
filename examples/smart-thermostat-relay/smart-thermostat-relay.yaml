# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Smart Thermostat Relay
# Room thermostat that drives a relay for a gas boiler or electric heater.
#
# Hardware:
#   - ESP32 DevKit
#   - DS18B20 1-Wire temperature probe (on a wire, away from the ESP32 heat)
#   - SSR or mechanical relay wired to the boiler call-for-heat input
#
# Safety:
#   - climate.thermostat with hysteresis (0.5 C deadband)
#   - Minimum off time 15 min to prevent boiler short-cycling
#   - Hard cutoff if room temp exceeds 28 C (runaway protection)

substitutions:
  device_name: "thermostat"
  friendly_name: "Thermostat"

  # 1-Wire bus and relay
  one_wire_pin: "GPIO4"
  relay_pin: "GPIO5"

  # Comfort and eco setpoints (C)
  comfort_temp: "21.0"
  eco_temp: "17.0"

  # Hard safety cutoff (C)
  max_safe_temp: "28.0"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# =============================================================================
# 1-Wire bus + DS18B20 probe
# =============================================================================

one_wire:
  - platform: gpio
    pin: ${one_wire_pin}

sensor:
  - platform: dallas_temp
    name: "${friendly_name} Room Temperature"
    id: room_temp
    update_interval: 10s
    accuracy_decimals: 2
    filters:
      - median:
          window_size: 5
          send_every: 1
    on_value_range:
      - above: ${max_safe_temp}
        then:
          - switch.turn_off: boiler_relay
          - logger.log:
              level: WARN
              format: "Safety cutoff: room temp above %.1f C"
              args: [ '${max_safe_temp}' ]

  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

# =============================================================================
# Boiler relay
# =============================================================================

switch:
  - platform: gpio
    pin: ${relay_pin}
    name: "${friendly_name} Boiler Relay"
    id: boiler_relay
    restore_mode: ALWAYS_OFF
    icon: "mdi:radiator"

# =============================================================================
# Climate (thermostat platform)
# =============================================================================

climate:
  - platform: thermostat
    name: "${friendly_name} Climate"
    id: room_thermostat
    sensor: room_temp

    default_target_temperature_low: 19.0
    default_target_temperature_high: 21.0

    # 0.5 C deadband each side of setpoint -> 1.0 C total hysteresis
    heat_overrun: 0.5
    heat_deadband: 0.5

    # Anti short-cycle: keep boiler off at least 15 min between calls
    min_heating_off_time: 15min
    min_heating_run_time: 5min
    min_idle_time: 30s

    heat_action:
      - switch.turn_on: boiler_relay
    idle_action:
      - switch.turn_off: boiler_relay
    off_mode:
      - switch.turn_off: boiler_relay

    preset:
      - name: Comfort
        default_target_temperature_low: ${comfort_temp}
        mode: HEAT
      - name: Eco
        default_target_temperature_low: ${eco_temp}
        mode: HEAT
      - name: Away
        default_target_temperature_low: 12.0
        mode: HEAT

# =============================================================================
# Buttons for quick preset switching
# =============================================================================

button:
  - platform: template
    name: "${friendly_name} Comfort Preset"
    icon: "mdi:sofa"
    on_press:
      - climate.control:
          id: room_thermostat
          preset: Comfort

  - platform: template
    name: "${friendly_name} Eco Preset"
    icon: "mdi:leaf"
    on_press:
      - climate.control:
          id: room_thermostat
          preset: Eco

  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
