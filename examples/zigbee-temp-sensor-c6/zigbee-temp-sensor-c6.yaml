# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Battery-powered Zigbee temperature + humidity sensor on ESP32-C6.
# Uses the Zigbee component that landed in ESPHome 2026.5.0.
# Reports via standard Zigbee clusters - ZHA and zigbee2mqtt both auto-recognize.

substitutions:
  devicename: "zigbee-temp-1"
  long_devicename: "Zigbee Temp 1"
  sleep_minutes: "15"           # report interval; raise for longer battery life

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "Battery Zigbee temp+humidity sensor (ESP32-C6)"

  # On reboot, take a reading and publish before going back to deep sleep.
  on_boot:
    priority: -100              # run after every component has set up
    then:
      - component.update: env_sensor
      - delay: 800ms            # let the I2C exchange complete and the
                                # Zigbee stack push the value through
      - deep_sleep.enter: ds

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf               # required: Arduino does not support C6 Zigbee

logger:
  level: WARN                   # keep log churn low for battery life

# Zigbee end device. Joining handshake fires the on_join trigger below.
zigbee:
  power_source: BATTERY         # advertised to ZHA / z2m so they expect long sleep
  on_join:
    then:
      - logger.log: "Joined Zigbee network"

# SHT40 over I2C - swap for SHT31 / SHT45 / Si7021 if that's what you wired
i2c:
  sda: GPIO22
  scl: GPIO23
  frequency: 400kHz

sensor:
  - platform: sht4x
    id: env_sensor
    update_interval: never      # we drive the read from on_boot
    temperature:
      id: room_temperature
      name: "${long_devicename} temperature"
    humidity:
      id: room_humidity
      name: "${long_devicename} humidity"

  # Zigbee endpoints - one cluster per measurement. The lambda copies the
  # cached SHT40 reading into the Zigbee attribute every time the
  # coordinator polls or we wake up.
  - platform: zigbee
    name: "${long_devicename} zigbee temperature"
    cluster: TEMPERATURE_MEASUREMENT
    lambda: "return id(room_temperature).state;"

  - platform: zigbee
    name: "${long_devicename} zigbee humidity"
    cluster: RELATIVE_HUMIDITY_MEASUREMENT
    lambda: "return id(room_humidity).state;"

# Battery voltage on GPIO4 through a 1:1 voltage divider.
# Adjust the multiply filter to match your divider.
  - platform: adc
    pin: GPIO4
    name: "${long_devicename} battery voltage"
    id: battery_voltage
    attenuation: 12db
    update_interval: never
    filters:
      - multiply: 2.0           # voltage divider scaling
      - round: 2

# Deep sleep between reports - this is what makes month-scale battery life work
deep_sleep:
  id: ds
  sleep_duration: "${sleep_minutes}min"
  # No run_duration: we exit deep_sleep via reboot and take exactly one
  # reading in on_boot before re-entering sleep.

# Manual override: pull GPIO9 LOW (BOOT button on most C6 dev boards) to
# prevent the device from sleeping while you flash a new firmware.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    name: "${long_devicename} stay-awake button"
    on_press:
      - deep_sleep.prevent: ds
