# Plant Monitor Automations for Home Assistant
# Add these to your automations.yaml or create them via the UI.

# =============================================================================
# Thirsty plant notification
# =============================================================================

- alias: "Plant - Thirsty notification"
  id: plant_thirsty_notify
  description: "Send a notification when the soil moisture drops below threshold"
  triggers:
    - trigger: state
      entity_id: binary_sensor.plant_monitor_thirsty
      to: "on"
      for:
        minutes: 10
  actions:
    - action: notify.notify
      data:
        title: "Thirsty plant"
        message: >
          Soil moisture is {{ states('sensor.plant_monitor_soil_moisture') }}%.
          Time to water the plant.

# =============================================================================
# Auto-water via a smart plug controlling a small pump
# =============================================================================
#
# Wire a small 5V or 12V water pump to a smart plug (or a relay) named
# switch.plant_pump. The pump runs for a short burst, then a cool-down
# window prevents repeated watering until the soil reading catches up.

- alias: "Plant - Auto water when soil is dry"
  id: plant_auto_water
  description: "Run the watering pump for a short burst when soil is dry"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.plant_monitor_soil_moisture
      below: 25
      for:
        minutes: 15
  conditions:
    # Do not water at night, you will not see leaks
    - condition: time
      after: "07:00:00"
      before: "21:00:00"
    # Do not water again within an hour of the last burst
    - condition: state
      entity_id: switch.plant_pump
      state: "off"
      for:
        minutes: 60
  actions:
    - action: switch.turn_on
      target:
        entity_id: switch.plant_pump
    - delay:
        seconds: 8
    - action: switch.turn_off
      target:
        entity_id: switch.plant_pump
    - action: notify.notify
      data:
        title: "Plant watered"
        message: "Pump ran for 8 seconds. Soil was {{ states('sensor.plant_monitor_soil_moisture') }}%."

# =============================================================================
# Low battery warning
# =============================================================================

- alias: "Plant - Low battery"
  id: plant_low_battery
  description: "Warn when the LiPo cell needs charging"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.plant_monitor_battery
      below: 20
  actions:
    - action: notify.notify
      data:
        title: "Plant monitor battery low"
        message: "Battery is at {{ states('sensor.plant_monitor_battery') }}%. Recharge soon."
