# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Battery-powered plant care monitor.
#
# Hardware:
#   - Seeed Xiao ESP32-C3 (low quiescent current, USB-C, built-in LiPo charger pads)
#   - Capacitive soil moisture sensor v1.2 (the cheap blue one from AliExpress)
#   - SHT40 air temperature + humidity sensor (I2C)
#   - 18650 LiPo cell with TP4056 charger module
#   - Voltage divider on a spare ADC pin for battery monitoring
#
# Why capacitive (not resistive): resistive probes drive DC current through
# soil and the exposed traces. They electrolyse and rust through in 3 to 6
# weeks. Capacitive probes have a corrosion-resistant coating over the
# electrodes and last for years.
#
# Power profile: deep_sleep for 30 minutes, wakes for ~3 seconds, samples,
# publishes, sleeps again. Expected battery life ~6 months on a 2000 mAh cell.

substitutions:
  device_name: "plant-monitor"
  friendly_name: "Plant Monitor"

  # Pins on the Xiao ESP32-C3
  soil_adc_pin: "GPIO2"      # A0 on Xiao silkscreen, capacitive probe analog out
  battery_adc_pin: "GPIO3"   # A1 on Xiao silkscreen, voltage divider
  sda_pin: "GPIO6"           # I2C SDA for SHT40
  scl_pin: "GPIO7"           # I2C SCL for SHT40

  # Capacitive soil sensor calibration.
  # Recalibrate per soil type. Procedure is in README.md.
  #   voltage_dry: probe in dry air, nothing touching it.
  #   voltage_wet: probe fully submerged in a glass of water, up to the
  #                white line (do NOT submerge the electronics).
  voltage_dry: "2.65"        # volts at 0% moisture
  voltage_wet: "1.15"        # volts at 100% moisture

  # Moisture threshold below which the plant is considered "thirsty"
  thirsty_threshold: "30"    # percent

  # Battery voltage divider: 2x 100k ohm resistors gives /2 ratio,
  # so the full-scale 4.2 V LiPo reads as 2.1 V at the ADC.
  battery_multiplier: "2.0"

  # Deep sleep duration. 30 minutes is plenty for soil, which changes slowly.
  sleep_duration: "30min"

  # How long to stay awake to take a stable reading and publish.
  awake_duration: "10s"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: "Battery-powered plant care monitor"

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # No fallback AP. A fallback AP keeps the radio on and kills battery life.
  fast_connect: true
  power_save_mode: high

api:
  encryption:
    key: !secret api_encryption_key
  # Reboot if the API cannot reconnect. Without this, a router glitch can
  # leave the node awake indefinitely, draining the battery.
  reboot_timeout: 5min

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  # USB-CDC stays available for flashing, but we silence it after boot to
  # save a little current.
  baud_rate: 0

# =============================================================================
# I2C bus (SHT40 air temp + humidity)
# =============================================================================

i2c:
  sda: ${sda_pin}
  scl: ${scl_pin}
  frequency: 100kHz

# =============================================================================
# Deep sleep
# =============================================================================
#
# Stays awake for ${awake_duration} after boot so HA can poll OTA, then
# sleeps for ${sleep_duration}.

deep_sleep:
  id: deep_sleep_control
  run_duration: ${awake_duration}
  sleep_duration: ${sleep_duration}

# =============================================================================
# Sensors
# =============================================================================

sensor:
  # Raw soil ADC voltage (kept internal, useful for recalibration)
  - platform: adc
    pin: ${soil_adc_pin}
    name: "${friendly_name} Soil Voltage"
    id: soil_voltage
    attenuation: 12db
    update_interval: 2s
    accuracy_decimals: 3
    unit_of_measurement: "V"
    entity_category: diagnostic
    filters:
      # Median of 5 readings smooths ADC noise without slowing wake-up too much
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1

  # Soil moisture as a percentage, calibrated against dry / wet endpoints
  - platform: template
    name: "${friendly_name} Soil Moisture"
    id: soil_moisture
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: moisture
    state_class: measurement
    icon: "mdi:water-percent"
    update_interval: 2s
    lambda: |-
      const float v = id(soil_voltage).state;
      const float dry = ${voltage_dry};
      const float wet = ${voltage_wet};
      // Linear map: dry -> 0%, wet -> 100%. Clamp to [0, 100].
      float pct = (dry - v) / (dry - wet) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;

  # Air temperature + humidity (SHT40 is a precision sensor, +/- 0.2 C)
  - platform: sht4x
    address: 0x44
    update_interval: 5s
    temperature:
      name: "${friendly_name} Air Temperature"
      id: air_temperature
      accuracy_decimals: 1
    humidity:
      name: "${friendly_name} Air Humidity"
      id: air_humidity
      accuracy_decimals: 1

  # Battery voltage
  - platform: adc
    pin: ${battery_adc_pin}
    name: "${friendly_name} Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    update_interval: 5s
    accuracy_decimals: 2
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    filters:
      - multiply: ${battery_multiplier}

  # Battery percentage. Rough mapping for a single 18650 LiPo cell:
  #   4.2 V = 100%, 3.7 V = 50%, 3.3 V = 0% (cutoff before damage)
  - platform: template
    name: "${friendly_name} Battery"
    id: battery_percent
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    update_interval: 5s
    lambda: |-
      const float v = id(battery_voltage).state;
      float pct = (v - 3.3f) / (4.2f - 3.3f) * 100.0f;
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;

  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

# =============================================================================
# Binary sensor: thirsty plant flag
# =============================================================================

binary_sensor:
  - platform: template
    name: "${friendly_name} Thirsty"
    id: plant_thirsty
    device_class: problem
    icon: "mdi:water-alert"
    lambda: |-
      return id(soil_moisture).state < ${thirsty_threshold};

# =============================================================================
# Control: prevent sleep button (handy during calibration)
# =============================================================================

switch:
  - platform: template
    name: "${friendly_name} Prevent Sleep"
    id: prevent_sleep
    icon: "mdi:sleep-off"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - deep_sleep.prevent: deep_sleep_control
    turn_off_action:
      - deep_sleep.allow: deep_sleep_control

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
