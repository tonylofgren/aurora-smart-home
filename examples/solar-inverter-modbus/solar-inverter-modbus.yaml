# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Solar inverter Modbus RTU bridge. Defaults are tuned for Growatt SPF / MIN
# series (single-phase off-grid and hybrid inverters), which use 9600 8N1 with
# a Modbus slave address of 1 on the RS485 service port.
#
# SAFETY: the RS485 wires from the inverter Modbus port are low-voltage and
# isolated, but route them away from DC PV strings and the AC tap. Use shielded
# twisted-pair cable and ground the shield at one end only.

substitutions:
  devicename: "solar-inverter"
  long_devicename: "Solar Inverter"
  # Modbus slave address. Growatt default is 1. Huawei SUN2000 default is 1
  # as well, but check the inverter display under Settings -> Communications.
  modbus_address: "1"

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "Growatt / Huawei / Polar inverter via Modbus RTU"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  # The Modbus driver is chatty at DEBUG. Keep it quiet on UART0.
  baud_rate: 0

# RS485 UART. Wire the MAX485 / HW-519 transceiver as:
#   ESP GPIO17 (TX) -> DI on the transceiver
#   ESP GPIO16 (RX) -> RO on the transceiver
#   A / B from the transceiver -> A / B on the inverter Modbus port
# Most cheap modules tie DE and RE together; if so, no flow_control_pin is
# needed because the modules auto-switch via the RX/TX activity.
uart:
  id: mod_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

modbus:
  id: mod_bus
  uart_id: mod_uart
  # Uncomment if your transceiver needs an explicit DE/RE pin:
  # flow_control_pin: GPIO4
  send_wait_time: 200ms

modbus_controller:
  - id: inverter
    address: ${modbus_address}
    modbus_id: mod_bus
    update_interval: 30s
    setup_priority: -10

sensor:
  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s

  # System status register. 0 = waiting, 1 = normal, 3 = fault.
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} status code"
    register_type: read
    address: 0x0000
    value_type: U_WORD

  # PV1 voltage (V, scale 0.1)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} PV1 voltage"
    register_type: read
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # PV1 input power (W, scale 0.1, 32-bit)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} PV1 power"
    register_type: read
    address: 0x0003
    value_type: U_DWORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # PV2 voltage (V, scale 0.1)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} PV2 voltage"
    register_type: read
    address: 0x0009
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # PV2 input power (W, scale 0.1, 32-bit)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} PV2 power"
    register_type: read
    address: 0x000B
    value_type: U_DWORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # AC output voltage (V, scale 0.1)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} AC voltage"
    register_type: read
    address: 0x000D
    value_type: U_WORD
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # AC frequency (Hz, scale 0.01)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} AC frequency"
    register_type: read
    address: 0x000E
    value_type: U_WORD
    unit_of_measurement: "Hz"
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  # AC output power total (W, scale 0.1, 32-bit)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} output power"
    register_type: read
    address: 0x000F
    value_type: U_DWORD
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Energy produced today (kWh, scale 0.1, 32-bit)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} energy today"
    register_type: read
    address: 0x0035
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Energy produced lifetime (kWh, scale 0.1, 32-bit)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} energy total"
    register_type: read
    address: 0x0037
    value_type: U_DWORD
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  # Inverter temperature (degrees C, scale 0.1)
  - platform: modbus_controller
    modbus_controller_id: inverter
    name: "${long_devicename} temperature"
    register_type: read
    address: 0x0093
    value_type: U_WORD
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

# Human-readable status string derived from the status code register.
text_sensor:
  - platform: template
    name: "${long_devicename} status"
    id: inverter_status_text
    lambda: |-
      auto s = id(inverter_status_code).state;
      if (isnan(s)) return std::string("unknown");
      int v = (int) s;
      switch (v) {
        case 0: return std::string("waiting");
        case 1: return std::string("normal");
        case 2: return std::string("checking");
        case 3: return std::string("fault");
        default: return std::string("code ") + std::to_string(v);
      }
    update_interval: 30s

# Mirror the raw status code so the template above can read it by id.
# This duplicates the entity above but keeps the lambda self-contained.
# Remove if you do not want the duplicate.
# (Uses the same register; ESPHome batches the read.)

switch:
  - platform: restart
    name: "${long_devicename} restart"
