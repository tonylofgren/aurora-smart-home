# Local Voice Assistant (ESP32-S3 + INMP441 + MAX98357A)
# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Hardware:
#   - ESP32-S3-DevKitC-1-N16R8 (16 MB flash, 8 MB PSRAM - REQUIRED for wake word)
#   - INMP441 I2S MEMS microphone (GPIO 4 WS, 5 SCK, 6 SD)
#   - MAX98357A I2S DAC + amplifier with 3W 4 ohm speaker (GPIO 7 LRC, 15 BCK, 16 DIN)
#   - WS2812 RGB LED on GPIO 48 (optional status indicator)
#   - USB-C power
#
# Pipeline:
#   ESP32-S3 (mic + micro_wake_word) -> HA Assist -> Whisper STT
#   -> conversation agent -> Piper TTS -> ESP32-S3 (speaker)
#
# Setup in Home Assistant:
#   1. Install "Whisper", "Piper" and "openWakeWord" add-ons
#   2. Settings > Voice assistants > Add Assistant (Whisper + Piper + local agent)
#   3. After flashing, assign this device to that pipeline

substitutions:
  device_name: "voice-assistant"
  friendly_name: "Voice Assistant"
  wake_word_model: "okay_nabu"   # alternatives: hey_jarvis, alexa, hey_mycroft

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: "2025.4.0"
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 0%
          blue: 0%
          brightness: 30%

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf            # required for voice_assistant + micro_wake_word
  variant: ESP32S3

psram:
  mode: octal                # N16R8 module ships with octal PSRAM
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

# -----------------------------------------------------------------------------
# Audio: two separate I2S buses (ESP32-S3 has multiple controllers)
# -----------------------------------------------------------------------------
i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO4
    i2s_bclk_pin: GPIO5
  - id: i2s_out
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO15

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO6
    adc_type: external
    pdm: false
    channel: left
    bits_per_sample: 32bit

speaker:
  - platform: i2s_audio
    id: spk
    i2s_audio_id: i2s_out
    dac_type: external
    i2s_dout_pin: GPIO16
    mode: mono

# -----------------------------------------------------------------------------
# Status LED (WS2812 single pixel)
# -----------------------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: GPIO48
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    default_transition_length: 0s

# -----------------------------------------------------------------------------
# Wake word (runs locally on ESP32-S3 - needs PSRAM)
# -----------------------------------------------------------------------------
micro_wake_word:
  models:
    - model: ${wake_word_model}
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# -----------------------------------------------------------------------------
# Voice assistant pipeline - audio goes to HA, response comes back
# -----------------------------------------------------------------------------
voice_assistant:
  microphone: mic
  speaker: spk
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  use_wake_word: false       # micro_wake_word handles wake detection
  on_listening:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 100%
        blue: 0%
        brightness: 60%
  on_stt_end:
    - light.turn_on:
        id: status_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 60%
  on_tts_start:
    - light.turn_on:
        id: status_led
        red: 0%
        green: 0%
        blue: 100%
        brightness: 60%
  on_end:
    - delay: 200ms
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 20%
    - micro_wake_word.start:
  on_error:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
    - delay: 1s
    - micro_wake_word.start:

# -----------------------------------------------------------------------------
# HA-exposed controls
# -----------------------------------------------------------------------------
button:
  - platform: template
    name: "Start Listening"
    id: btn_listen
    on_press:
      - voice_assistant.start:

switch:
  - platform: template
    name: "Wake Word Enabled"
    id: wake_word_enabled
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - micro_wake_word.start:
    turn_off_action:
      - micro_wake_word.stop:

binary_sensor:
  - platform: status
    name: "Online"
