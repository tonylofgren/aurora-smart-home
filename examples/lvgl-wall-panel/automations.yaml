# LVGL Wall Panel automations for Home Assistant
# Add these to your automations.yaml or via the HA UI.

# =============================================================================
# Wake the panel briefly when a notification arrives
# =============================================================================

- alias: "Wall panel - Wake on doorbell"
  id: wall_panel_wake_doorbell
  description: "Force the panel backlight on for 30 s when the doorbell rings"
  triggers:
    - trigger: state
      entity_id: binary_sensor.front_doorbell
      to: "on"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.wall_panel_backlight
      data:
        brightness_pct: 100
    - delay: "00:00:30"
    - action: light.turn_off
      target:
        entity_id: light.wall_panel_backlight

# =============================================================================
# Lower panel brightness at night
# =============================================================================

- alias: "Wall panel - Night brightness"
  id: wall_panel_night_brightness
  description: "Cap backlight at 20% between 22:00 and 06:00 to avoid glare"
  triggers:
    - trigger: time
      at: "22:00:00"
    - trigger: time
      at: "06:00:00"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.wall_panel_backlight
      data:
        brightness_pct: >
          {% if now().hour >= 22 or now().hour < 6 %}20{% else %}80{% endif %}
