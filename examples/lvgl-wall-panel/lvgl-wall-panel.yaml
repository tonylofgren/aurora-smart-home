# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# ESP32-S3 wall-mounted Home Assistant control panel with an LVGL touchscreen UI.
# Reference hardware: Sunton ESP32-2432S028R (ESP32 + 2.8" 240x320 ILI9341 + XPT2046).
# A variant for the Sunton ESP32-S3-4827S043 (4.3" 480x272 ILI9488) is included below.
#
# Uses 2026.5.0 LVGL improvements:
#   - grid_rows "3x" shorthand
#   - on_pressed lambda with point.x / point.y
#   - on_update trigger to separate programmatic vs user value changes

substitutions:
  devicename: "wall-panel"
  long_devicename: "Wall Panel"
  # Idle timeout before the backlight dims to zero.
  idle_timeout: "30s"

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "LVGL wall panel for Home Assistant"
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: backlight
          brightness: 80%

esp32:
  board: esp32dev          # Sunton ESP32-2432S028R uses plain ESP32-WROOM-32
  framework:
    type: arduino          # ILI9341 + XPT2046 SPI drivers are stable on arduino

# For the Sunton ESP32-S3 4.3" panel, replace the esp32 block with:
#
# esp32:
#   board: esp32-s3-devkitc-1
#   variant: ESP32S3
#   framework:
#     type: esp-idf
#   psram:
#     mode: octal
#     speed: 80MHz

psram:                     # required for LVGL framebuffer beyond 240x320
  mode: quad
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

time:
  - platform: homeassistant
    id: ha_time

# -----------------------------------------------------------------------------
# Display + touch
# -----------------------------------------------------------------------------
spi:
  - id: display_spi
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin: GPIO12
  - id: touch_spi
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39

display:
  - platform: ili9xxx
    model: ILI9341          # change to ILI9488 for the 4.3" Sunton S3 panel
    spi_id: display_spi
    cs_pin: GPIO15
    dc_pin: GPIO2
    reset_pin:
      number: GPIO4
      ignore_strapping_warning: true
    invert_colors: false
    auto_clear_enabled: false
    update_interval: never  # LVGL drives redraws itself

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: "${long_devicename} backlight"
    restore_mode: ALWAYS_ON
    default_transition_length: 200ms

touchscreen:
  - platform: xpt2046
    id: panel_touch
    spi_id: touch_spi
    cs_pin: GPIO33
    interrupt_pin: GPIO36
    update_interval: 50ms
    threshold: 400
    calibration:
      x_min: 200
      x_max: 3900
      y_min: 200
      y_max: 3900
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false
    on_touch:
      then:
        - light.turn_on:
            id: backlight
            brightness: 80%
        - script.execute: reset_idle_timer

# -----------------------------------------------------------------------------
# Idle timer: dim the backlight to zero after no touch for ${idle_timeout}
# -----------------------------------------------------------------------------
script:
  - id: reset_idle_timer
    mode: restart
    then:
      - delay: ${idle_timeout}
      - light.turn_off:
          id: backlight
          transition_length: 1s

# -----------------------------------------------------------------------------
# Home Assistant entities pulled in to drive the UI
# -----------------------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: temp_setpoint
    entity_id: number.thermostat_setpoint
  - platform: homeassistant
    id: temp_current
    entity_id: sensor.living_room_temperature
  - platform: homeassistant
    id: weather_temp
    entity_id: sensor.weather_temperature
  - platform: homeassistant
    id: volume_group
    entity_id: number.audio_group_volume
  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.home
  - platform: homeassistant
    id: now_playing_title
    entity_id: sensor.audio_hub_now_playing_title
  - platform: homeassistant
    id: now_playing_artist
    entity_id: sensor.audio_hub_now_playing_artist

switch:
  - platform: restart
    name: "${long_devicename} restart"

# -----------------------------------------------------------------------------
# LVGL UI
# -----------------------------------------------------------------------------
lvgl:
  theme:
    button:
      bg_color: 0x1f2937
      text_color: 0xf3f4f6
      radius: 8
    slider:
      indicator:
        bg_color: 0x3b82f6
      knob:
        bg_color: 0xf3f4f6
  on_idle:
    timeout: ${idle_timeout}
    then:
      - light.turn_off:
          id: backlight
          transition_length: 1s
  pages:
    # -------------------------------------------------------------------------
    # Page 1: Lights
    # -------------------------------------------------------------------------
    - id: page_lights
      widgets:
        - obj:
            width: 100%
            height: 32
            align: TOP_MID
            widgets:
              - label:
                  text: !lambda |-
                    static char buf[16];
                    auto now = id(ha_time).now();
                    if (!now.is_valid()) { return std::string("--:--"); }
                    snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                    return std::string(buf);
                  align: LEFT_MID
                  text_font: montserrat_24
              - label:
                  text: !lambda |-
                    return id(weather_state).state + " " +
                      std::to_string((int)id(weather_temp).state) + "C";
                  align: RIGHT_MID
                  text_font: montserrat_16
        - obj:
            width: 100%
            height: 240
            align: BOTTOM_MID
            layout:
              type: GRID
              grid_columns: [FR(1), FR(1)]
              grid_rows: "4x"          # 2026.5.0 shorthand: 4 equal rows
              pad_row: 8
              pad_column: 8
            widgets:
              - label: { text: "Living", grid_cell_column_pos: 0, grid_cell_row_pos: 0 }
              - slider:
                  id: slider_living
                  min_value: 0
                  max_value: 100
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 0
                  width: 100%
                  on_update:
                    # on_update fires for BOTH user and programmatic updates;
                    # we use it to keep the slider visually in sync without loops.
                    then:
                      - logger.log:
                          format: "Living slider updated to %.0f"
                          args: [ "x" ]
                  on_release:
                    then:
                      - homeassistant.action:
                          action: number.set_value
                          data:
                            entity_id: number.living_room_light_brightness
                            value: !lambda "return std::to_string(int(x));"
              - label: { text: "Bedroom", grid_cell_column_pos: 0, grid_cell_row_pos: 1 }
              - slider:
                  id: slider_bedroom
                  min_value: 0
                  max_value: 100
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 1
                  width: 100%
                  on_release:
                    then:
                      - homeassistant.action:
                          action: number.set_value
                          data:
                            entity_id: number.bedroom_light_brightness
                            value: !lambda "return std::to_string(int(x));"
              - label: { text: "Kitchen", grid_cell_column_pos: 0, grid_cell_row_pos: 2 }
              - slider:
                  id: slider_kitchen
                  min_value: 0
                  max_value: 100
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 2
                  width: 100%
                  on_release:
                    then:
                      - homeassistant.action:
                          action: number.set_value
                          data:
                            entity_id: number.kitchen_light_brightness
                            value: !lambda "return std::to_string(int(x));"
              - label: { text: "Hallway", grid_cell_column_pos: 0, grid_cell_row_pos: 3 }
              - slider:
                  id: slider_hallway
                  min_value: 0
                  max_value: 100
                  grid_cell_column_pos: 1
                  grid_cell_row_pos: 3
                  width: 100%
                  on_release:
                    then:
                      - homeassistant.action:
                          action: number.set_value
                          data:
                            entity_id: number.hallway_light_brightness
                            value: !lambda "return std::to_string(int(x));"

    # -------------------------------------------------------------------------
    # Page 2: Climate
    # -------------------------------------------------------------------------
    - id: page_climate
      widgets:
        - obj:
            width: 100%
            height: 100%
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
            widgets:
              - label:
                  text: "Thermostat"
                  text_font: montserrat_20
              - label:
                  id: label_current_temp
                  text: !lambda 'return std::to_string((int)id(temp_current).state) + "C now";'
                  text_font: montserrat_16
              - label:
                  id: label_setpoint
                  text: !lambda 'return std::to_string((int)id(temp_setpoint).state) + "C";'
                  text_font: montserrat_48
              - obj:
                  layout:
                    type: FLEX
                    flex_flow: ROW
                  pad_column: 16
                  widgets:
                    - button:
                        width: 72
                        height: 72
                        # on_pressed receives the touch point (point.x / point.y in 2026.5.0).
                        on_pressed:
                          then:
                            - lambda: |-
                                ESP_LOGD("ui", "down pressed at %d,%d", point.x, point.y);
                            - homeassistant.action:
                                action: number.decrement
                                data:
                                  entity_id: number.thermostat_setpoint
                        widgets:
                          - label: { text: "-", align: CENTER, text_font: montserrat_32 }
                    - button:
                        width: 72
                        height: 72
                        on_pressed:
                          then:
                            - lambda: |-
                                ESP_LOGD("ui", "up pressed at %d,%d", point.x, point.y);
                            - homeassistant.action:
                                action: number.increment
                                data:
                                  entity_id: number.thermostat_setpoint
                        widgets:
                          - label: { text: "+", align: CENTER, text_font: montserrat_32 }

    # -------------------------------------------------------------------------
    # Page 3: Music (Sendspin group control + volume + metadata)
    # -------------------------------------------------------------------------
    - id: page_music
      widgets:
        - obj:
            width: 100%
            height: 100%
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: SPACE_EVENLY
              flex_align_cross: CENTER
            widgets:
              - label:
                  id: label_track_title
                  text: !lambda "return id(now_playing_title).state;"
                  text_font: montserrat_20
                  long_mode: SCROLL
                  width: 90%
                  text_align: CENTER
              - label:
                  id: label_track_artist
                  text: !lambda "return id(now_playing_artist).state;"
                  text_font: montserrat_14
              - obj:
                  layout:
                    type: FLEX
                    flex_flow: ROW
                  pad_column: 16
                  widgets:
                    - button:
                        width: 64
                        height: 64
                        on_press:
                          then:
                            - homeassistant.action:
                                action: media_player.media_previous_track
                                data:
                                  entity_id: media_player.audio_hub_all_rooms
                        widgets:
                          - label: { text: "<<", align: CENTER }
                    - button:
                        width: 80
                        height: 64
                        on_press:
                          then:
                            - homeassistant.action:
                                action: media_player.media_play_pause
                                data:
                                  entity_id: media_player.audio_hub_all_rooms
                        widgets:
                          - label: { text: "Play", align: CENTER }
                    - button:
                        width: 64
                        height: 64
                        on_press:
                          then:
                            - homeassistant.action:
                                action: media_player.media_next_track
                                data:
                                  entity_id: media_player.audio_hub_all_rooms
                        widgets:
                          - label: { text: ">>", align: CENTER }
              - slider:
                  id: slider_volume
                  width: 90%
                  min_value: 0
                  max_value: 100
                  on_release:
                    then:
                      - homeassistant.action:
                          action: number.set_value
                          data:
                            entity_id: number.audio_group_volume
                            value: !lambda "return std::to_string(int(x));"
