# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# M5Stack ATOM-S3 - 0.85" 128x128 IPS color LCD info display
# Rotating 4-page dashboard with the front button (GPIO41) cycling pages.

substitutions:
  device_name: "atom-s3-display"
  friendly_name: "ATOM S3 Display"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(current_page) = 0;

esp32:
  board: atoms3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

time:
  - platform: homeassistant
    id: ha_time

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"

# Backlight on GPIO16. Default on; exposed as a light for manual override.
output:
  - platform: gpio
    pin: GPIO16
    id: backlight_output

light:
  - platform: binary
    name: "Display Backlight"
    output: backlight_output
    id: backlight
    restore_mode: ALWAYS_ON

# Front button cycles pages 0..3
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Page Button"
    id: page_button
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 1) % 4;
        - component.update: main_display

  - platform: homeassistant
    id: front_door
    entity_id: binary_sensor.front_door

  - platform: homeassistant
    id: balcony_window
    entity_id: binary_sensor.balcony_window

  - platform: homeassistant
    id: person_tony
    entity_id: person.tony

  - platform: homeassistant
    id: person_anna
    entity_id: person.anna

sensor:
  - platform: homeassistant
    id: outdoor_temp
    entity_id: sensor.outdoor_temp

  - platform: homeassistant
    id: living_temp
    entity_id: sensor.living_room_temp

  - platform: homeassistant
    id: living_humidity
    entity_id: sensor.living_room_humidity

  - platform: homeassistant
    id: living_co2
    entity_id: sensor.living_room_co2

text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: weather.home

  - platform: homeassistant
    id: light_living
    entity_id: light.living_room

  - platform: homeassistant
    id: light_bedroom
    entity_id: light.bedroom

  - platform: homeassistant
    id: light_kitchen
    entity_id: light.kitchen

font:
  - file: "fonts/Roboto-Medium.ttf"
    id: font_medium
    size: 18
  - file: "fonts/Roboto-Regular.ttf"
    id: font_small
    size: 12
  - file: "fonts/Roboto-Bold.ttf"
    id: font_large
    size: 24

color:
  - id: c_white
    red: 100%
    green: 100%
    blue: 100%
  - id: c_dim
    red: 60%
    green: 60%
    blue: 60%
  - id: c_green
    red: 20%
    green: 90%
    blue: 30%
  - id: c_red
    red: 95%
    green: 25%
    blue: 25%
  - id: c_amber
    red: 100%
    green: 70%
    blue: 0%

spi:
  clk_pin: GPIO15
  mosi_pin: GPIO21

display:
  - platform: ili9xxx
    model: gc9a01a
    id: main_display
    cs_pin: GPIO14
    dc_pin: GPIO42
    reset_pin: GPIO48
    rotation: 0
    update_interval: 5s
    lambda: |-
      it.fill(Color::BLACK);
      int page = id(current_page);

      if (page == 0) {
        // Clock + weather
        it.printf(64, 8, id(font_small), id(c_dim), TextAlign::TOP_CENTER, "%s",
                  id(ha_time).now().strftime("%a %d %b").c_str());
        it.strftime(64, 30, id(font_large), id(c_white), TextAlign::TOP_CENTER,
                    "%H:%M", id(ha_time).now());
        it.printf(64, 70, id(font_medium), id(c_amber), TextAlign::TOP_CENTER,
                  "%.1f C", id(outdoor_temp).state);
        it.printf(64, 96, id(font_small), id(c_dim), TextAlign::TOP_CENTER, "%s",
                  id(weather_state).state.c_str());
      } else if (page == 1) {
        // Lights
        it.printf(64, 6, id(font_medium), id(c_white), TextAlign::TOP_CENTER, "Lights");
        it.printf(8, 36, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Living");
        it.printf(120, 36, id(font_small),
                  id(light_living).state == "on" ? id(c_green) : id(c_red),
                  TextAlign::TOP_RIGHT, "%s", id(light_living).state.c_str());
        it.printf(8, 58, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Bedroom");
        it.printf(120, 58, id(font_small),
                  id(light_bedroom).state == "on" ? id(c_green) : id(c_red),
                  TextAlign::TOP_RIGHT, "%s", id(light_bedroom).state.c_str());
        it.printf(8, 80, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Kitchen");
        it.printf(120, 80, id(font_small),
                  id(light_kitchen).state == "on" ? id(c_green) : id(c_red),
                  TextAlign::TOP_RIGHT, "%s", id(light_kitchen).state.c_str());
      } else if (page == 2) {
        // Living room climate sensors
        it.printf(64, 6, id(font_medium), id(c_white), TextAlign::TOP_CENTER, "Climate");
        it.printf(8, 36, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Temp");
        it.printf(120, 36, id(font_small), id(c_white), TextAlign::TOP_RIGHT,
                  "%.1f C", id(living_temp).state);
        it.printf(8, 58, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "RH");
        it.printf(120, 58, id(font_small), id(c_white), TextAlign::TOP_RIGHT,
                  "%.0f %%", id(living_humidity).state);
        it.printf(8, 80, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "CO2");
        it.printf(120, 80, id(font_small),
                  id(living_co2).state > 1000 ? id(c_red) : id(c_green),
                  TextAlign::TOP_RIGHT, "%.0f ppm", id(living_co2).state);
      } else {
        // Presence + security
        it.printf(64, 6, id(font_medium), id(c_white), TextAlign::TOP_CENTER, "Home");
        it.printf(8, 32, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Tony");
        it.printf(120, 32, id(font_small),
                  id(person_tony).state ? id(c_green) : id(c_dim),
                  TextAlign::TOP_RIGHT, id(person_tony).state ? "home" : "away");
        it.printf(8, 52, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Anna");
        it.printf(120, 52, id(font_small),
                  id(person_anna).state ? id(c_green) : id(c_dim),
                  TextAlign::TOP_RIGHT, id(person_anna).state ? "home" : "away");
        it.printf(8, 78, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Door");
        it.printf(120, 78, id(font_small),
                  id(front_door).state ? id(c_red) : id(c_green),
                  TextAlign::TOP_RIGHT, id(front_door).state ? "open" : "closed");
        it.printf(8, 100, id(font_small), id(c_dim), TextAlign::TOP_LEFT, "Balcony");
        it.printf(120, 100, id(font_small),
                  id(balcony_window).state ? id(c_red) : id(c_green),
                  TextAlign::TOP_RIGHT, id(balcony_window).state ? "open" : "closed");
      }

      // Page indicator dots
      for (int i = 0; i < 4; i++) {
        it.filled_circle(48 + i * 11, 120, 2,
                         i == page ? id(c_white) : id(c_dim));
      }
