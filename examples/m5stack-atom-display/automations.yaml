#
# Example Home Assistant automations to pair with the ATOM-S3 display.

- alias: "ATOM S3 - dim backlight at night"
  triggers:
    - trigger: time
      at: "22:30:00"
  actions:
    - action: light.turn_off
      target:
        entity_id: light.atom_s3_display_display_backlight

- alias: "ATOM S3 - wake backlight in the morning"
  triggers:
    - trigger: time
      at: "06:30:00"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.atom_s3_display_display_backlight

- alias: "ATOM S3 - alert on high CO2 (page indicator hint)"
  triggers:
    - trigger: numeric_state
      entity_id: sensor.living_room_co2
      above: 1200
      for:
        minutes: 5
  actions:
    - action: notify.mobile_app_tony
      data:
        title: "High CO2"
        message: "Living room CO2 has been above 1200 ppm for 5 minutes."
