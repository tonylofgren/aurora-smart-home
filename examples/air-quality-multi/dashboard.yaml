# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Lovelace dashboard for the Multi-Sensor Air Quality Monitor.
# Paste the `cards:` content into a new view in Settings -> Dashboards,
# or copy individual cards into an existing dashboard.

title: Air Quality
icon: mdi:air-filter
path: air-quality
cards:
  # ---------------------------------------------------------------------------
  # Headline gauges
  # ---------------------------------------------------------------------------
  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.air_quality_co2
        name: CO2
        unit: ppm
        min: 400
        max: 2000
        needle: true
        severity:
          green: 400
          yellow: 800
          red: 1200

      - type: gauge
        entity: sensor.air_quality_pm2_5
        name: PM2.5
        unit: ug/m3
        min: 0
        max: 100
        needle: true
        severity:
          green: 0
          yellow: 12
          red: 35

      - type: gauge
        entity: sensor.air_quality_voc_index
        name: VOC index
        min: 0
        max: 500
        needle: true
        severity:
          green: 0
          yellow: 150
          red: 250

  # ---------------------------------------------------------------------------
  # Secondary metrics
  # ---------------------------------------------------------------------------
  - type: entities
    title: All readings
    show_header_toggle: false
    entities:
      - entity: sensor.air_quality_co2
        name: CO2
      - entity: sensor.air_quality_pm1_0
        name: PM1.0
      - entity: sensor.air_quality_pm2_5
        name: PM2.5
      - entity: sensor.air_quality_pm10
        name: PM10
      - entity: sensor.air_quality_voc_index
        name: VOC index
      - entity: sensor.air_quality_nox_index
        name: NOx index
      - entity: sensor.air_quality_temperature
        name: Temperature
      - entity: sensor.air_quality_humidity
        name: Humidity

  # ---------------------------------------------------------------------------
  # 24 hour history graphs
  # ---------------------------------------------------------------------------
  - type: history-graph
    title: CO2 last 24 hours
    hours_to_show: 24
    refresh_interval: 60
    entities:
      - entity: sensor.air_quality_co2
        name: CO2

  - type: history-graph
    title: Particulate matter last 24 hours
    hours_to_show: 24
    refresh_interval: 60
    entities:
      - entity: sensor.air_quality_pm1_0
        name: PM1.0
      - entity: sensor.air_quality_pm2_5
        name: PM2.5
      - entity: sensor.air_quality_pm10
        name: PM10

  - type: history-graph
    title: VOC and NOx index last 24 hours
    hours_to_show: 24
    refresh_interval: 60
    entities:
      - entity: sensor.air_quality_voc_index
        name: VOC index
      - entity: sensor.air_quality_nox_index
        name: NOx index

  - type: history-graph
    title: Temperature and humidity last 24 hours
    hours_to_show: 24
    refresh_interval: 60
    entities:
      - entity: sensor.air_quality_temperature
        name: Temperature
      - entity: sensor.air_quality_humidity
        name: Humidity

  # ---------------------------------------------------------------------------
  # Controls
  # ---------------------------------------------------------------------------
  - type: entities
    title: Controls
    show_header_toggle: false
    entities:
      - entity: button.air_quality_force_scd41_outdoor_calibration
        name: Force outdoor calibration
      - entity: switch.air_quality_restart
        name: Restart device
      - entity: sensor.air_quality_uptime
        name: Uptime
