# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Sample Home Assistant automations for the Multi-Sensor Air Quality Monitor.
# Copy into your automations.yaml or a package file. Adjust entity_ids,
# notify targets, and fan/HVAC entities to match your installation.

automation:
  # ---------------------------------------------------------------------------
  # 1. High CO2 alert: notify when CO2 stays above 1200 ppm for 10 minutes.
  #    1200 ppm is the upper end of "acceptable", above this cognition degrades.
  # ---------------------------------------------------------------------------
  - id: air_quality_high_co2_alert
    alias: "Air Quality: High CO2 alert"
    description: "Notify when CO2 exceeds 1200 ppm for 10 minutes"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.air_quality_co2
        above: 1200
        for:
          minutes: 10
    action:
      - service: notify.mobile_app
        data:
          title: "High CO2 in the room"
          message: >-
            CO2 is {{ states('sensor.air_quality_co2') }} ppm.
            Open a window or start the ventilation fan.

  # ---------------------------------------------------------------------------
  # 2. Auto-start ventilation fan when CO2 crosses 1000 ppm.
  #    Replace `switch.ventilation_fan` with your fan or HVAC entity.
  # ---------------------------------------------------------------------------
  - id: air_quality_auto_ventilation
    alias: "Air Quality: Auto-start ventilation"
    description: "Turn on ventilation fan when CO2 exceeds 1000 ppm"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.air_quality_co2
        above: 1000
        for:
          minutes: 2
    condition:
      - condition: state
        entity_id: switch.ventilation_fan
        state: "off"
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.ventilation_fan
      - delay:
          minutes: 30
      - service: switch.turn_off
        target:
          entity_id: switch.ventilation_fan

  # ---------------------------------------------------------------------------
  # 3. High particulate alert: PM2.5 above 35 ug/m3 (WHO "unhealthy for
  #    sensitive groups" threshold).
  # ---------------------------------------------------------------------------
  - id: air_quality_high_particulate_alert
    alias: "Air Quality: High particulate alert"
    description: "Notify when PM2.5 exceeds 35 ug/m3"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.air_quality_pm2_5
        above: 35
        for:
          minutes: 5
    action:
      - service: notify.mobile_app
        data:
          title: "High particulate matter"
          message: >-
            PM2.5 is {{ states('sensor.air_quality_pm2_5') }} ug/m3.
            Check for cooking smoke, candles, or outdoor sources.

  # ---------------------------------------------------------------------------
  # 4. Daily air quality summary at 09:00.
  # ---------------------------------------------------------------------------
  - id: air_quality_daily_summary
    alias: "Air Quality: Daily summary at 09:00"
    description: "Send a daily readout of air quality at 09:00"
    mode: single
    trigger:
      - platform: time
        at: "09:00:00"
    action:
      - service: notify.mobile_app
        data:
          title: "Daily air quality summary"
          message: >-
            CO2: {{ states('sensor.air_quality_co2') }} ppm
            PM2.5: {{ states('sensor.air_quality_pm2_5') }} ug/m3
            VOC index: {{ states('sensor.air_quality_voc_index') }}
            Temperature: {{ states('sensor.air_quality_temperature') }} C
            Humidity: {{ states('sensor.air_quality_humidity') }} %

  # ---------------------------------------------------------------------------
  # 5. Trigger HVAC fan run if VOC index stays above 250 for 15 minutes.
  #    250 indicates a strong VOC source (solvents, fresh paint, off-gassing).
  # ---------------------------------------------------------------------------
  - id: air_quality_high_voc_hvac_run
    alias: "Air Quality: HVAC fan on high VOC"
    description: "Run HVAC fan for 20 minutes when VOC index exceeds 250"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.air_quality_voc_index
        above: 250
        for:
          minutes: 15
    action:
      - service: climate.set_fan_mode
        target:
          entity_id: climate.living_room
        data:
          fan_mode: "on"
      - delay:
          minutes: 20
      - service: climate.set_fan_mode
        target:
          entity_id: climate.living_room
        data:
          fan_mode: "auto"

  # ---------------------------------------------------------------------------
  # 6. Weekly reminder to run outdoor calibration on the SCD41.
  # ---------------------------------------------------------------------------
  - id: air_quality_weekly_calibration_reminder
    alias: "Air Quality: Weekly calibration reminder"
    description: "Sunday 10:00 reminder to recalibrate the SCD41 outdoors"
    mode: single
    trigger:
      - platform: time
        at: "10:00:00"
    condition:
      - condition: time
        weekday:
          - sun
    action:
      - service: notify.mobile_app
        data:
          title: "Air quality monitor: weekly calibration"
          message: >-
            Take the air quality monitor outside for 3 minutes, then press
            the "force SCD41 outdoor calibration" button in Home Assistant.
