# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Multi-sensor indoor air quality monitor (DIY Awair / Apollo MSR-1 equivalent).
# Sensors: SCD41 (CO2, temperature, humidity), SGP41 (VOC, NOx), PMS5003 (PM1.0/PM2.5/PM10).
# Optional 0.96 inch SSD1306 OLED for in-room display.
#
# All sensors update every 60 seconds. Air composition changes slowly; faster
# sampling wastes power on the PMS5003 fan and gives no useful resolution.
#
# CALIBRATION: the SCD41 ships with a factory CO2 baseline that drifts over
# time. Run the "Force SCD41 outdoor calibration" button once a week while
# the unit sits outdoors in clean air for at least 3 minutes. See README.

substitutions:
  devicename: "air-quality"
  long_devicename: "Air Quality"

esphome:
  name: "${devicename}"
  friendly_name: "${long_devicename}"
  comment: "Indoor air quality (CO2, VOC, NOx, PM2.5)"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${devicename} hotspot"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# I2C bus shared by SCD41, SGP41, and the optional OLED.
i2c:
  sda: GPIO8
  scl: GPIO9
  frequency: 100kHz
  scan: true

# UART for the PMS5003. Use UART1; the PMS5003 outputs 3.3V logic so no level
# shifter is required, but its Vcc pin MUST be 5V (the internal fan is 5V).
uart:
  id: pms_uart
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 9600

# -----------------------------------------------------------------------------
# Sensors
# -----------------------------------------------------------------------------
sensor:
  # SCD41: NDIR CO2 + temperature + humidity ----------------------------------
  - platform: scd4x
    address: 0x62
    update_interval: 60s
    measurement_mode: periodic
    temperature_offset: 4.0     # typical self-heating of a sealed enclosure
    automatic_self_calibration: true
    co2:
      name: "${long_devicename} CO2"
      id: co2_value
      filters:
        - filter_out: nan
    temperature:
      name: "${long_devicename} temperature"
      id: temperature_value
    humidity:
      name: "${long_devicename} humidity"
      id: humidity_value

  # SGP41: VOC index + NOx index ----------------------------------------------
  # The Sensirion VOC/NOx algorithm needs ambient temperature + humidity for
  # compensation, which we feed from the SCD41 above.
  - platform: sgp4x
    address: 0x59
    update_interval: 60s
    compensation:
      temperature_source: temperature_value
      humidity_source: humidity_value
    voc:
      name: "${long_devicename} VOC index"
      id: voc_value
      algorithm_tuning:
        index_offset: 100
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    nox:
      name: "${long_devicename} NOx index"
      id: nox_value
      algorithm_tuning:
        index_offset: 1
        learning_time_offset_hours: 12
        learning_time_gain_hours: 12
        gating_max_duration_minutes: 720
        std_initial: 50
        gain_factor: 230

  # PMS5003: particulate matter -----------------------------------------------
  - platform: pmsx003
    type: PMSX003
    uart_id: pms_uart
    update_interval: 60s
    pm_1_0:
      name: "${long_devicename} PM1.0"
    pm_2_5:
      name: "${long_devicename} PM2.5"
      id: pm25_value
    pm_10_0:
      name: "${long_devicename} PM10"

  - platform: uptime
    name: "${long_devicename} uptime"
    update_interval: 60s

# -----------------------------------------------------------------------------
# Optional OLED display (0.96 inch SSD1306, 128x64, I2C address 0x3C)
# Comment out this whole block if no display is fitted.
# -----------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto"
    id: font_big
    size: 18

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 5s
    lambda: |-
      it.printf(0, 0, id(font_small), "CO2  %.0f ppm", id(co2_value).state);
      it.printf(0, 12, id(font_small), "PM25 %.0f ug", id(pm25_value).state);
      it.printf(0, 24, id(font_small), "VOC  %.0f", id(voc_value).state);
      it.printf(0, 36, id(font_small), "Temp %.1f C", id(temperature_value).state);
      it.printf(0, 48, id(font_small), "RH   %.0f %%", id(humidity_value).state);

# -----------------------------------------------------------------------------
# Diagnostics + calibration controls
# -----------------------------------------------------------------------------
button:
  - platform: template
    name: "${long_devicename} force SCD41 outdoor calibration"
    id: scd41_force_cal
    on_press:
      then:
        - scd4x.perform_forced_calibration:
            value: 420            # outdoor CO2 baseline in ppm
            id: ${devicename}_scd4x   # not used, kept for older fw

switch:
  - platform: restart
    name: "${long_devicename} restart"
