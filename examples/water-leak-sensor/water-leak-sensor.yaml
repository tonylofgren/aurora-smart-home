# Generated by aurora@aurora-smart-home (esphome skill)
# https://github.com/tonylofgren/aurora-smart-home
#
# Battery-powered water leak sensor
# Deep sleeps indefinitely. Wakes on water bridging the probe contacts.
#
# Hardware:
#   - Seeed Xiao ESP32-C3 (USB-C, ~21x18 mm)
#   - 2x stainless steel probes (3 mm bolts work well)
#   - 1 MOhm pull-down resistor from sense pin to GND
#   - 3.3V supplied to one probe, sense pin reads the other
#   - LiPo battery 2000 mAh (JST-PH on Xiao back side)
#   - Piezo buzzer (passive or active) on GPIO output
#   - Optional: voltage divider on GPIO2 for battery monitoring

substitutions:
  device_name: "water-leak-sensor"
  friendly_name: "Water Leak Sensor"

  # Wake pin: HIGH when water bridges the probes (water completes 3.3V -> probe A -> water -> probe B -> sense pin)
  leak_pin: "GPIO3"

  # Piezo buzzer (local audible alarm while leak is present)
  buzzer_pin: "GPIO4"

  # Battery voltage divider output (ADC). Divider: VBAT -- 100k -- ADC -- 100k -- GND
  battery_adc_pin: "GPIO2"

  # Daily heartbeat (battery report) interval
  heartbeat_interval: "24h"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      # If we woke because water is present, sound the alarm immediately.
      - if:
          condition:
            binary_sensor.is_on: water_leak
          then:
            - logger.log: "Boot: water detected on wake pin"
            - switch.turn_on: buzzer

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Short connect timeout: we want to report and go back to sleep fast.
  fast_connect: true
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key
  # Stay awake briefly after API connects so HA gets the leak event before deep sleep.
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# =============================================================================
# Deep Sleep
# =============================================================================
# Sleeps indefinitely. Wakes on:
#   1. Leak pin going HIGH (water bridges probes)
#   2. Internal timer (daily heartbeat for battery report)

deep_sleep:
  id: leak_deep_sleep
  run_duration: 30s        # stay awake just long enough to send the event
  sleep_duration: ${heartbeat_interval}
  wakeup_pin:
    number: ${leak_pin}
    allow_other_uses: true
  wakeup_pin_mode: KEEP_AWAKE

# =============================================================================
# Sensors (water detection + battery)
# =============================================================================

binary_sensor:
  - platform: gpio
    pin:
      number: ${leak_pin}
      mode: INPUT
      allow_other_uses: true
    name: "${friendly_name} Leak"
    id: water_leak
    device_class: moisture
    filters:
      - delayed_on: 50ms     # debounce against droplets / electrical noise
    on_press:
      - logger.log: "WATER LEAK DETECTED"
      - switch.turn_on: buzzer
    on_release:
      - switch.turn_off: buzzer

  - platform: status
    name: "${friendly_name} Status"

sensor:
  - platform: adc
    pin: ${battery_adc_pin}
    name: "${friendly_name} Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    update_interval: 60s
    accuracy_decimals: 2
    unit_of_measurement: "V"
    device_class: voltage
    filters:
      - multiply: 2.0        # compensate for 100k/100k divider

  - platform: template
    name: "${friendly_name} Battery"
    id: battery_percent
    unit_of_measurement: "%"
    device_class: battery
    update_interval: 60s
    accuracy_decimals: 0
    lambda: |-
      // LiPo: ~3.3V empty, ~4.2V full
      float v = id(battery_voltage).state;
      float pct = (v - 3.3f) / (4.2f - 3.3f) * 100.0f;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      return pct;

  - platform: wifi_signal
    name: "${friendly_name} WiFi"
    update_interval: 60s
    entity_category: diagnostic

# =============================================================================
# Buzzer (local audible alarm)
# =============================================================================

switch:
  - platform: gpio
    pin: ${buzzer_pin}
    name: "${friendly_name} Buzzer"
    id: buzzer
    restore_mode: ALWAYS_OFF

  # Manual override: prevent next sleep cycle (useful during firmware updates).
  - platform: template
    name: "${friendly_name} Prevent Sleep"
    id: prevent_sleep
    optimistic: true
    turn_on_action:
      - deep_sleep.prevent: leak_deep_sleep
    turn_off_action:
      - deep_sleep.allow: leak_deep_sleep

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

text_sensor:
  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic
