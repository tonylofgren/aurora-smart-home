# Generated by aurora@aurora-smart-home (esphome skill) v1.7.7
# https://github.com/tonylofgren/aurora-smart-home
#
# LoRa Sensor Node
# ----------------
# Battery-powered ESP32 sensor node transmitting via LoRa (SX127x).
# Reads DHT22 temperature and humidity, then deep sleeps between cycles.
#
# Hardware:
#   - ESP32 DevKit or TTGO LoRa32 / Heltec WiFi LoRa 32
#   - SX1276 (SX127x family) LoRa transceiver module
#   - DHT22 (AM2302) temperature/humidity sensor
#   - LiPo or Li-Ion battery with optional voltage divider for monitoring
#
# Wiring (ESP32 DevKit + standalone SX1276 breakout):
#   SX1276 NSS  -> GPIO5   (SPI Chip Select)
#   SX1276 SCK  -> GPIO18  (SPI Clock)
#   SX1276 MOSI -> GPIO23  (SPI MOSI)
#   SX1276 MISO -> GPIO19  (SPI MISO)
#   SX1276 RST  -> GPIO14  (Reset)
#   SX1276 DIO0 -> GPIO26  (IRQ / TX done / RX done)
#   SX1276 DIO1 -> GPIO35  (optional, for RX timeout)
#   SX1276 3.3V -> 3.3V
#   SX1276 GND  -> GND
#
#   DHT22 DATA  -> GPIO4   (with 10k pull-up to 3.3V)
#   DHT22 VCC   -> 3.3V (or GPIO-switched for ultra-low power)
#   DHT22 GND   -> GND
#
#   Battery+    -> GPIO34 via 100k/100k voltage divider (measures up to 4.2V)
#
# Note: On TTGO LoRa32 / Heltec boards the SPI pins are usually pre-wired.
#       Check your board's pinout and update substitutions accordingly.

substitutions:
  device_name: "lora-sensor-node"
  friendly_name: "LoRa Sensor Node"

  # Deep sleep timing
  sleep_duration: "5min"    # Time between sensor readings
  run_duration: "20s"       # Wake time — enough for DHT read + LoRa TX

  # SPI / SX127x pins
  lora_nss_pin:  "GPIO5"
  lora_sck_pin:  "GPIO18"
  lora_mosi_pin: "GPIO23"
  lora_miso_pin: "GPIO19"
  lora_rst_pin:  "GPIO14"
  lora_dio0_pin: "GPIO26"

  # DHT22 pin
  dht_pin: "GPIO4"

  # Battery voltage divider pin (ADC1 channel, GPIO32-GPIO39 only)
  battery_adc_pin: "GPIO34"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - lambda: |-
          switch(esp_sleep_get_wakeup_cause()) {
            case ESP_SLEEP_WAKEUP_TIMER:
              id(wakeup_reason).publish_state("Timer");
              break;
            default:
              id(wakeup_reason).publish_state("Power On");
          }

esp32:
  board: esp32dev
  framework:
    # esp-idf is required for the sx127x component
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  # Reduce radio power during short wake window
  power_save_mode: light

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
    # Prevent sleep during OTA flash
    on_begin:
      - deep_sleep.prevent: deep_sleep_1
    on_end:
      - deep_sleep.allow: deep_sleep_1
    on_error:
      - deep_sleep.allow: deep_sleep_1

logger:
  # Disable serial output to save power; set to DEBUG for bench testing
  level: WARN
  baud_rate: 0

# =============================================================================
# Deep Sleep
# =============================================================================

deep_sleep:
  id: deep_sleep_1
  run_duration: ${run_duration}
  sleep_duration: ${sleep_duration}

# =============================================================================
# SPI Bus (shared between SX127x and any other SPI peripherals)
# =============================================================================

spi:
  clk_pin:  ${lora_sck_pin}
  mosi_pin: ${lora_mosi_pin}
  miso_pin: ${lora_miso_pin}

# =============================================================================
# SX127x LoRa Transceiver
#
# Key parameters explained:
#
#   frequency: 868000000 Hz (868 MHz)
#     EU ISM band (863-870 MHz). Use 915000000 for US/AU.
#     Always check local regulations before transmitting.
#
#   bandwidth: 125kHz
#     Signal bandwidth. Options: 7.8, 10.4, 15.6, 20.8, 31.25, 41.7,
#     62.5, 125, 250, 500 kHz.
#     Narrower = longer range + slower data rate.
#     125 kHz is the LoRaWAN standard default.
#
#   spreading_factor: 7
#     Chips per symbol (SF7-SF12). Higher SF = longer range but slower.
#     SF7  ~ 5.5 kbps, shortest range  (use for short distances / high traffic)
#     SF12 ~ 250 bps,  maximum range   (use for distant nodes / low traffic)
#     Each step up doubles air time and roughly doubles range.
#
#   coding_rate: 4/5
#     Forward error correction overhead. 4/5 = lightest (1 redundant bit per 4).
#     Options: 4/5, 4/6, 4/7, 4/8. Higher = more robust but slower.
#
#   tx_power: 17 dBm
#     Transmit power 2-20 dBm (PA_BOOST). Reduce to save battery if nodes
#     are within short range. Max legal EIRP in EU is +14 dBm (with antenna).
# =============================================================================

sx127x:
  nss_pin:  ${lora_nss_pin}
  rst_pin:  ${lora_rst_pin}
  dio0_pin: ${lora_dio0_pin}

  # RF parameters — adjust for your deployment
  frequency:       868000000   # 868 MHz (EU ISM band)
  bandwidth:       125kHz
  spreading_factor: 7
  coding_rate:     "4/5"
  tx_power:        17          # dBm; lower for closer nodes to reduce battery use
  preamble_length: 8           # Standard LoRa preamble

# =============================================================================
# Sensors
# =============================================================================

sensor:
  # --- DHT22 Temperature & Humidity ---
  - platform: dht
    pin: ${dht_pin}
    model: DHT22
    # Single reading per wake cycle is enough; deep_sleep handles the interval
    update_interval: 10s
    temperature:
      name: "${friendly_name} Temperature"
      id: temperature
      accuracy_decimals: 1
    humidity:
      name: "${friendly_name} Humidity"
      id: humidity
      accuracy_decimals: 0

  # --- Battery Voltage (100k/100k divider, max input ~8.4V -> max ADC 4.2V) ---
  - platform: adc
    pin: ${battery_adc_pin}
    name: "${friendly_name} Battery Voltage"
    id: battery_voltage
    # 11dB attenuation allows input up to ~3.9V on ESP32 ADC
    attenuation: 11db
    update_interval: 10s
    filters:
      # Multiply by 2 because the divider halves the battery voltage.
      # Adjust the factor if you use a different divider ratio.
      - multiply: 2.0
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    entity_category: diagnostic
    on_value_range:
      - below: 3.2
        then:
          - logger.log: "Battery critical — entering long sleep"
          - deep_sleep.enter:
              id: deep_sleep_1
              sleep_duration: 30min

  # --- Battery Percentage (calculated from voltage) ---
  - platform: template
    name: "${friendly_name} Battery"
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    entity_category: diagnostic
    lambda: |-
      float v = id(battery_voltage).state;
      // LiPo discharge curve: 3.0V = 0%, 4.2V = 100%
      float pct = (v - 3.0f) / (4.2f - 3.0f) * 100.0f;
      if (pct > 100.0f) return 100.0f;
      if (pct < 0.0f)   return 0.0f;
      return pct;
    update_interval: 10s

# =============================================================================
# Binary Sensors
# =============================================================================

binary_sensor:
  # Low battery alert
  - platform: template
    name: "${friendly_name} Low Battery"
    device_class: battery
    lambda: return id(battery_voltage).state < 3.4f;

  # Hold GPIO0 (BOOT button) low at boot to block deep sleep for OTA
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} OTA Mode"
    entity_category: diagnostic
    on_press:
      - deep_sleep.prevent: deep_sleep_1
      - logger.log: "OTA mode active — deep sleep prevented"

# =============================================================================
# Text Sensors
# =============================================================================

text_sensor:
  - platform: template
    name: "${friendly_name} Wakeup Reason"
    id: wakeup_reason
    update_interval: never
    entity_category: diagnostic

  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic

# =============================================================================
# Buttons
# =============================================================================

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config
