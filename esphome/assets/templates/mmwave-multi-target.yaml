# Generated by aurora@aurora-smart-home (esphome skill) v1.7.8
# https://github.com/tonylofgren/aurora-smart-home
#
# mmWave Multi-Target Presence Detection - RD-03D
# ------------------------------------------------
# Tracks up to 3 simultaneous targets with X/Y position and speed.
# Reports presence, target count, and per-target coordinates.
#
# Hardware: ESP32 or ESP32-S3 + RD-03D radar module
# Protocol: UART (rd03d component)
#
# When to use this sensor:
#   Use RD-03D when you need multi-target tracking (up to 3 people,
#   exact X/Y positions, per-target speed).
#   Use LD2410/LD2450 for simpler single-zone presence detection
#   where only "someone is here" matters.
#
# =====================================================================
# WIRING DIAGRAM
# =====================================================================
#
#   RD-03D          ESP32
#   -------         -----
#   VCC  ---------> 5V (or VIN on most boards)
#   GND  ---------> GND
#   TX   ---------> GPIO16  (ESP32 RX2 / UART2 RX)
#   RX   ---------> GPIO17  (ESP32 TX2 / UART2 TX)
#
#   NOTE: RD-03D logic is 3.3 V tolerant on TX/RX despite 5 V supply.
#   For ESP32-S3 use GPIO44 (RX) / GPIO43 (TX) or any free UART pins.
#
#   Optional: connect an LED to GPIO2 as a status indicator.
#
# =====================================================================

substitutions:
  device_name: "mmwave-presence"
  friendly_name: "mmWave Presence"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  # For ESP32-S3: board: esp32-s3-devkitc-1

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name}-fallback"
    password: !secret wifi_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Disable serial logger so UART2 is free for RD-03D
logger:
  level: INFO
  baud_rate: 0

# =====================================================================
# UART — RD-03D
# Pin assignments match the wiring diagram above.
# Change tx_pin / rx_pin if using different GPIO or ESP32-S3.
# =====================================================================
uart:
  id: rd03d_uart
  tx_pin: GPIO17   # Connected to RD-03D RX
  rx_pin: GPIO16   # Connected to RD-03D TX
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# =====================================================================
# RD-03D component
# =====================================================================
rd03d:
  id: my_rd03d
  uart_id: rd03d_uart

  # on_target fires every time the sensor reports a new target frame.
  # Use this for zone-based automations (e.g. different scenes per zone).
  on_target:
    - lambda: |-
        // target_count is the number of active targets this frame (0-3).
        // Each target has: x (cm, negative = left), y (cm, forward),
        // speed (cm/s, negative = moving away).
        // Example: trigger a scene when target 0 enters the "desk zone".
        if (target_count > 0) {
          float x0 = targets[0].x;
          float y0 = targets[0].y;
          if (x0 > -60 && x0 < 60 && y0 < 120) {
            // Target is within 1.2 m in front, ±60 cm wide — desk zone
            // id(desk_scene).turn_on();  // example action
          }
        }

# =====================================================================
# Binary sensor — any presence
# =====================================================================
binary_sensor:
  - platform: rd03d
    rd03d_id: my_rd03d
    has_target:
      name: "${friendly_name} Presence"
      device_class: occupancy

  - platform: status
    name: "${friendly_name} Status"

# =====================================================================
# Sensors — target count + per-target position and speed
# =====================================================================
sensor:
  # --- Target count ---
  - platform: rd03d
    rd03d_id: my_rd03d
    target_count:
      name: "${friendly_name} Target Count"
      icon: mdi:account-multiple

  # --- Target 1 ---
  - platform: rd03d
    rd03d_id: my_rd03d
    target_1:
      x:
        name: "${friendly_name} Target 1 X"
        unit_of_measurement: cm
        icon: mdi:axis-x-arrow
      y:
        name: "${friendly_name} Target 1 Y"
        unit_of_measurement: cm
        icon: mdi:axis-y-arrow
      speed:
        name: "${friendly_name} Target 1 Speed"
        unit_of_measurement: cm/s
        icon: mdi:run-fast

  # --- Target 2 ---
  - platform: rd03d
    rd03d_id: my_rd03d
    target_2:
      x:
        name: "${friendly_name} Target 2 X"
        unit_of_measurement: cm
        icon: mdi:axis-x-arrow
      y:
        name: "${friendly_name} Target 2 Y"
        unit_of_measurement: cm
        icon: mdi:axis-y-arrow
      speed:
        name: "${friendly_name} Target 2 Speed"
        unit_of_measurement: cm/s
        icon: mdi:run-fast

  # --- Target 3 ---
  - platform: rd03d
    rd03d_id: my_rd03d
    target_3:
      x:
        name: "${friendly_name} Target 3 X"
        unit_of_measurement: cm
        icon: mdi:axis-x-arrow
      y:
        name: "${friendly_name} Target 3 Y"
        unit_of_measurement: cm
        icon: mdi:axis-y-arrow
      speed:
        name: "${friendly_name} Target 3 Speed"
        unit_of_measurement: cm/s
        icon: mdi:run-fast

  # --- Diagnostics ---
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "${friendly_name} Uptime"
    entity_category: diagnostic

# =====================================================================
# Text sensors — diagnostics
# =====================================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"
      entity_category: diagnostic

  - platform: version
    name: "${friendly_name} ESPHome Version"
    entity_category: diagnostic

# =====================================================================
# Buttons
# =====================================================================
button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

  - platform: safe_mode
    name: "${friendly_name} Safe Mode"
    entity_category: config
