# Generated by aurora@aurora-smart-home (esphome skill) v1.7.5
# https://github.com/tonylofgren/aurora-smart-home
#
# Valve-based irrigation controller with 4 zones
# Board: ESP32 DevKit (change board ID to match your hardware)

substitutions:
  device_name: irrigation
  friendly_name: "Irrigation Controller"

esphome:
  name: ${device_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome

logger:

# --- Zone Valve Relays ---

switch:
  - platform: gpio
    pin: GPIO26
    id: relay_zone1
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO27
    id: relay_zone2
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO32
    id: relay_zone3
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO33
    id: relay_zone4
    internal: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO25
    id: relay_pump
    name: "Water Pump"
    internal: true
    restore_mode: ALWAYS_OFF

# --- Valve Entities ---

valve:
  - platform: template
    name: "Zone 1 - Front Lawn"
    id: zone1
    optimistic: true
    open_action:
      - switch.turn_on: relay_pump
      - switch.turn_on: relay_zone1
    close_action:
      - switch.turn_off: relay_zone1
      - script.execute: check_pump

  - platform: template
    name: "Zone 2 - Back Garden"
    id: zone2
    optimistic: true
    open_action:
      - switch.turn_on: relay_pump
      - switch.turn_on: relay_zone2
    close_action:
      - switch.turn_off: relay_zone2
      - script.execute: check_pump

  - platform: template
    name: "Zone 3 - Flower Beds"
    id: zone3
    optimistic: true
    open_action:
      - switch.turn_on: relay_pump
      - switch.turn_on: relay_zone3
    close_action:
      - switch.turn_off: relay_zone3
      - script.execute: check_pump

  - platform: template
    name: "Zone 4 - Vegetable Patch"
    id: zone4
    optimistic: true
    open_action:
      - switch.turn_on: relay_pump
      - switch.turn_on: relay_zone4
    close_action:
      - switch.turn_off: relay_zone4
      - script.execute: check_pump

# --- Scheduling ---

datetime:
  - platform: template
    name: "Irrigation Start Time"
    id: irrigation_start
    type: time
    optimistic: true
    initial_value: "06:00:00"
    restore_value: true

number:
  - platform: template
    name: "Zone Duration (minutes)"
    id: zone_duration
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 15
    optimistic: true
    restore_value: true
    unit_of_measurement: "min"

# --- Pump Safety Script ---
# Turns off pump when no zones are open

script:
  - id: check_pump
    then:
      - delay: 500ms
      - if:
          condition:
            and:
              - switch.is_off: relay_zone1
              - switch.is_off: relay_zone2
              - switch.is_off: relay_zone3
              - switch.is_off: relay_zone4
          then:
            - switch.turn_off: relay_pump
            - logger.log: "All zones closed, pump off"

# --- Soil Moisture Sensor (optional) ---

sensor:
  - platform: adc
    pin: GPIO34
    name: "Soil Moisture"
    id: soil_moisture
    unit_of_measurement: "%"
    update_interval: 60s
    attenuation: 11db
    filters:
      - calibrate_linear:
          - 2.8 -> 0.0   # Dry
          - 1.2 -> 100.0  # Wet
      - clamp:
          min_value: 0
          max_value: 100

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
