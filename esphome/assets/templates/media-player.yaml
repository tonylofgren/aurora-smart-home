# Generated by aurora@aurora-smart-home (esphome skill) v1.7.6
# https://github.com/tonylofgren/aurora-smart-home
#
# Speaker Media Player with I2S DAC (MAX98357A)
# Board: ESP32-S3 DevKitC (change board ID to match your hardware)
# Hardware: MAX98357A I2S amplifier + INMP441 microphone (optional)

substitutions:
  device_name: room-speaker
  friendly_name: "Room Speaker"

esphome:
  name: ${device_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome

logger:

# --- I2S Audio Bus ---
# ESP32-S3 supports two I2S peripherals for simultaneous input/output

i2s_audio:
  - id: i2s_speaker
    i2s_lrclk_pin: GPIO7     # WS  → MAX98357A LRC
    i2s_bclk_pin: GPIO8      # BCK → MAX98357A BCLK
  - id: i2s_mic
    i2s_lrclk_pin: GPIO3     # WS  → INMP441 WS
    i2s_bclk_pin: GPIO4      # BCK → INMP441 SCK

# --- Speaker Output (MAX98357A) ---

speaker:
  - platform: i2s_audio
    id: amp_speaker
    i2s_audio_id: i2s_speaker
    dac_type: external
    i2s_dout_pin: GPIO9       # DIN → MAX98357A DIN
    mode: mono
    sample_rate: 16000
    bits_per_sample: 16

# --- Microphone Input (INMP441) - optional, remove if not needed ---

microphone:
  - platform: i2s_audio
    id: mic_input
    i2s_audio_id: i2s_mic
    adc_type: external
    i2s_din_pin: GPIO5        # SD → INMP441 SD
    pdm: false
    bits_per_sample: 32
    channel: left

# --- Media Player ---

media_player:
  - platform: speaker
    name: ${friendly_name}
    id: room_player
    speaker: amp_speaker
    on_play:
      - light.turn_on:
          id: status_led
          brightness: 30%
    on_idle:
      - light.turn_off: status_led

# --- Volume Control (rotary encoder, optional) ---

sensor:
  - platform: rotary_encoder
    name: "Volume Knob"
    id: volume_knob
    pin_a: GPIO40
    pin_b: GPIO41
    resolution: 1
    min_value: 0
    max_value: 100
    on_value:
      then:
        - media_player.volume_set:
            id: room_player
            volume: !lambda 'return x / 100.0;'

# --- Status LED ---

light:
  - platform: binary
    name: "Status LED"
    id: status_led
    output: led_output

output:
  - platform: gpio
    pin: GPIO48
    id: led_output

