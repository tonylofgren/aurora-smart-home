# Generated by aurora@aurora-smart-home (esphome skill) v1.7.4
# https://github.com/tonylofgren/aurora-smart-home
#
# Template Alarm Control Panel with PIR motion + door sensors
# Board: ESP32 DevKit (change board ID to match your hardware)

substitutions:
  device_name: home-alarm
  friendly_name: "Home Alarm"

esphome:
  name: ${device_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome

logger:

# --- Binary Sensors (Alarm Zones) ---

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO27
      mode: INPUT_PULLUP
      inverted: true
    name: "Front Door"
    id: front_door
    device_class: door
    filters:
      - delayed_on: 50ms

  - platform: gpio
    pin:
      number: GPIO26
      mode: INPUT_PULLUP
      inverted: true
    name: "Back Door"
    id: back_door
    device_class: door
    filters:
      - delayed_on: 50ms

  - platform: gpio
    pin: GPIO25
    name: "Living Room Motion"
    id: living_room_motion
    device_class: motion
    filters:
      - delayed_off: 10s

  - platform: gpio
    pin: GPIO33
    name: "Hallway Motion"
    id: hallway_motion
    device_class: motion
    filters:
      - delayed_off: 10s

# --- Alarm Control Panel ---

alarm_control_panel:
  - platform: template
    name: ${friendly_name}
    id: home_alarm
    codes:
      - "1234"
    requires_code_to_arm: false

    # Timing
    arming_away_time: 30s
    arming_home_time: 10s
    pending_time: 30s
    trigger_time: 300s

    # Sensor zones
    binary_sensors:
      - input: front_door
        type: delayed         # Triggers after pending_time (entry delay)
      - input: back_door
        type: instant         # Triggers immediately (no delay)
      - input: living_room_motion
        type: delayed_follower  # Instant unless a delayed sensor triggered first
        bypass_armed_home: true  # Ignored when armed_home
      - input: hallway_motion
        type: delayed_follower
        bypass_armed_home: true

    # Automations
    on_arming:
      - logger.log: "Alarm arming..."
      - rtttl.play: "arming:d=16,o=5,b=100:c,p,c,p,c"
    on_pending:
      - logger.log: "Entry detected - pending disarm"
      - rtttl.play: "pending:d=8,o=5,b=200:c,p,c,p,c,p,c"
    on_triggered:
      - logger.log: "ALARM TRIGGERED!"
      - switch.turn_on: siren
    on_cleared:
      - logger.log: "Alarm cleared"
      - switch.turn_off: siren
    on_disarmed:
      - switch.turn_off: siren

# --- Siren Output ---

switch:
  - platform: gpio
    pin: GPIO32
    name: "Siren"
    id: siren
    icon: "mdi:alarm-bell"

# --- Status Buzzer (optional) ---

output:
  - platform: ledc
    pin: GPIO19
    id: buzzer_output

rtttl:
  output: buzzer_output
