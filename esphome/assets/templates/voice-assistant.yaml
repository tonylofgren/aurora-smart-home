# Generated by aurora@aurora-smart-home (esphome skill) v1.7.8
# https://github.com/tonylofgren/aurora-smart-home
#
# Voice Assistant Template
# ------------------------
# Local voice assistant with on-device wake word detection.
# Works with Home Assistant Assist pipeline (Whisper STT + Piper TTS).
#
# Hardware Requirements:
#   - ESP32-S3 with PSRAM (required for Micro Wake Word)
#   - I2S Microphone (INMP441 recommended)
#   - I2S Amplifier + Speaker (MAX98357A + 3W speaker)
#   - Optional: RGB LED for status indication
#
# Home Assistant Setup:
#   1. Install Whisper and Piper add-ons
#   2. Create Assist pipeline with local STT/TTS
#   3. Device auto-connects when flashed
#
# Wake Word Options: hey_jarvis, alexa, okay_nabu

substitutions:
  device_name: "voice-assistant"
  friendly_name: "Voice Assistant"
  # Wake word: hey_jarvis, alexa, okay_nabu
  wake_word: "okay_nabu"
  # Microphone pins (INMP441)
  mic_ws_pin: "GPIO3"
  mic_sck_pin: "GPIO2"
  mic_sd_pin: "GPIO4"
  # Speaker pins (MAX98357A)
  spk_lrc_pin: "GPIO6"
  spk_bclk_pin: "GPIO7"
  spk_din_pin: "GPIO8"
  # Status LED pin (WS2812)
  led_pin: "GPIO48"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  platformio_options:
    board_build.flash_mode: dio
    board_build.mcu: esp32s3

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_IDF_EXPERIMENTAL_FEATURES: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none  # Low latency
  ap:
    ssid: "${device_name}-fallback"

api:
  encryption:
    key: !secret api_encryption_key
  # Auto-start wake word when connected to HA
  on_client_connected:
    - micro_wake_word.start:
    - light.turn_on:
        id: status_led
        effect: "Ready"

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO
  logs:
    voice_assistant: DEBUG

# =============================================================================
# I2S Audio Configuration
# =============================================================================

i2s_audio:
  - id: i2s_input
    i2s_lrclk_pin: ${mic_ws_pin}
    i2s_bclk_pin: ${mic_sck_pin}
  - id: i2s_output
    i2s_lrclk_pin: ${spk_lrc_pin}
    i2s_bclk_pin: ${spk_bclk_pin}

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_input
    i2s_din_pin: ${mic_sd_pin}
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    channel: left

speaker:
  - platform: i2s_audio
    id: speaker_out
    i2s_audio_id: i2s_output
    i2s_dout_pin: ${spk_din_pin}
    dac_type: external
    mode: mono

# =============================================================================
# Wake Word Detection (On-Device)
# =============================================================================

micro_wake_word:
  models:
    - model: ${wake_word}
  on_wake_word_detected:
    - logger.log: "Wake word detected!"
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# =============================================================================
# Voice Assistant
# =============================================================================

voice_assistant:
  id: va
  microphone: mic
  speaker: speaker_out
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_listening:
    - light.turn_on:
        id: status_led
        effect: "Listening"

  on_stt_vad_end:
    - light.turn_on:
        id: status_led
        effect: "Processing"

  on_tts_start:
    - light.turn_on:
        id: status_led
        effect: "Speaking"

  on_end:
    - light.turn_on:
        id: status_led
        effect: "Ready"
    - wait_until:
        not:
          speaker.is_playing:
    - delay: 300ms
    - micro_wake_word.start:

  on_error:
    - logger.log:
        format: "Voice error: %s"
        args: ['message.c_str()']
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
    - delay: 2s
    - light.turn_on:
        id: status_led
        effect: "Ready"
    - micro_wake_word.start:

# =============================================================================
# Status LED (WS2812)
# =============================================================================

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    pin: ${led_pin}
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    rmt_channel: 0
    default_transition_length: 0s
    effects:
      # Ready - slow cyan breathing
      - pulse:
          name: "Ready"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 50%
      # Listening - blue pulse
      - pulse:
          name: "Listening"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 20%
          max_brightness: 80%
      # Processing - yellow fast pulse
      - pulse:
          name: "Processing"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
      # Speaking - green slow pulse
      - pulse:
          name: "Speaking"
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 30%
          max_brightness: 70%
    on_turn_on:
      - light.control:
          id: status_led
          red: 0%
          green: 80%
          blue: 100%

# =============================================================================
# Physical Button (Optional - uses BOOT button on DevKit)
# =============================================================================

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"
    on_multi_click:
      # Single click - manual trigger
      - timing:
          - ON for at most 1s
          - OFF for at least 0.3s
        then:
          - if:
              condition:
                voice_assistant.is_running:
              then:
                - voice_assistant.stop:
              else:
                - micro_wake_word.stop:
                - voice_assistant.start:
      # Double click - restart wake word
      - timing:
          - ON for at most 0.5s
          - OFF for at most 0.3s
          - ON for at most 0.5s
          - OFF for at least 0.3s
        then:
          - voice_assistant.stop:
          - micro_wake_word.start:

  - platform: status
    name: "Status"

# =============================================================================
# Diagnostic Sensors
# =============================================================================

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

  - platform: internal_temperature
    name: "CPU Temperature"
    update_interval: 60s
    entity_category: diagnostic

text_sensor:
  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic

switch:
  - platform: template
    name: "Wake Word"
    id: wake_word_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - micro_wake_word.start:
    on_turn_off:
      - micro_wake_word.stop:

button:
  - platform: restart
    name: "Restart"
    entity_category: config
